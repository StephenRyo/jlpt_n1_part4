】及后续年份纯正题目的大图无损全量大放送！","opt_notes":["嗯，在最后一刻还是黄了。（逻辑硬伤：彻底搞反了结局，项目最终是保住了）","已经完全没有办法挽回了吗？（逻辑硬伤：误以为项目现在彻底完蛋了）","是啊，那时候一度都在担心这项目到底会变成什么样呢。（得体回应：一時はどうなることかと思った是职场中劫后余生、对过去惊险过程进行回顾时的殿段级标准职场共情客套话）"]}]},{"label":"2017年7月","questions":[{"num":1,"q":"ああ、木村さん、席はずしてた?部長がお探しですよ。","opts":["さあ、部長はお见かけしてませんが。","ああ、すみません。すぐ参ります。","私も一緒にお探ししましょうか。"],"ans":2,"analysis":"問題1（考点：意图推断：通知/敬语应用） 啊，木村，你刚才不在座位上吗？部长在找你哦。（席をはずしてた？询问对方是否曾离开座位，お探しですよ是传达信息的常用语）","opt_notes":["那个，我没看见部长。（答非所问：对方在找你，而不是你找他）","啊，对不起，我马上过去。（得体回应：参ります是行きます的谦让语，是回应上级找自己时的标准行动）","我也一起找吧？（逻辑不符：对方在找自己）"]},{"num":2,"q":"森さん、駅前のすし屋、行ってきたよ。森さんが薦めるだけのことはあるね。","opts":["うん、僕もすごく気に入ってるんだ。","そっか。おいしくなかったか。","僕はなかなかいい店だと思ったんだけどなあ。"],"ans":1,"analysis":"問題2（考点：语法句型/意图推断：赞赏） 森，我去了站前的寿司店了。真不愧是你推荐的店啊。（~だけのことはある是基于事实（森推荐了）做出正面评价的句型）","opt_notes":["嗯，我也特别喜欢那家店。（得体回应：作为推荐者，对对方的赞同表示肯定）","是吗，不好吃啊？（逻辑不符：与薦めるだけのことはある的正面评价相反）","我觉得那家店挺不错的啊。（逻辑不符：这是在对方提出负面看法时，自己反驳的说法）"]},{"num":3,"q":"おおたさん、受付に置いといたマイク、见当たらないんだけど。","opts":["ああ、課長が持ってったよ。","受付に置いといていいよ。","ああ、マイク見つかったんだね。"],"ans":1,"analysis":"問題3（考点：意图推断：报告问题） 大田，放在前台的麦克风，找不到了。（見当たらない表示遍寻不获，是在报告问题）","opt_notes":["啊，被课长拿走了。（得体回应：提供了关于麦克风去向的信息）","放在前台就行。（逻辑不符：这是在下达指示）","啊，麦克风找到了啊。（逻辑不符：与見当たらない的意思相反）"]},{"num":4,"q":"ねえ、今度のゼミの食事会、人多くないし、予約するまでもないよね。","opts":["そう。予約入れといたほうがいいんだ。","そうだね。予約する必要ないよね。","予約してあるなら、心配要らないね。"],"ans":2,"analysis":"問題4（考点：语法句型/意图推断：寻求共鸣） 喂，这次研讨会的聚餐，人也不多，没必要预约吧。（~までもないよね是提出自己的判断并寻求对方同意的表达）","opt_notes":["是吗，还是预约一下比较好啊。（逻辑不符：这是在提出反对意见）","是啊，没必要预约。（得体回应：そうだね直接表示了同意）","既然预约了，就不用担心了。（逻辑不符：前提是“没必要预约”）"]},{"num":5,"q":"はらさん、昨年度の販売成績見たよ。日ごろの努力あっての結果だね。","opts":["結果が出ずに残念です。","こつこつ頑張りました。","努力したんですが、申し訳ありません。"],"ans":2,"analysis":"問題5（考点：语法句型/意图推断：赞扬） 原，我看了去年的销售业绩。这是你平日努力的结果啊。（~あっての表示“正因为有前者，才有后者”，用于强调前者是基础）","opt_notes":["没能出结果很遗憾。（逻辑不符：对方在肯定结果）","是的，我一直踏踏实实地努力了。（得体回应：こつこつ頑張りました是对上级肯定的、积极而不失谦虚的回应）","虽然努力了，但非常抱歉。（逻辑不符：这是业绩不好时说的话）"]},{"num":6,"q":"今倉庫見てきたら、明日の会議に使う椅子埃まみれだったよ。","opts":["へえ、埃一つないのか。","じゃあ、拭かなきゃいけないね。","椅子そのままでも使えそうで、助かるね。"],"ans":2,"analysis":"問題6（考点：意图推断：报告问题） 刚才去仓库看了下，明天开会要用的椅子上全是灰。（埃まみれだった报告一个负面状况）","opt_notes":["哦，一尘不染啊。（逻辑不符：与埃まみれ的意思相反）","那必须得擦一下了。（得体回应：~なきゃいけないね是针对问题提出的合理解决方案）","椅子能直接用，太好了。（逻辑不符：与埃まみれ的事实相反）"]},{"num":7,"q":"テストにレポートに来週の発表って、こう重なるとお手上げ。","opts":["全部終わってよかったね。","まあ、何とかなるんじゃない。","へえ、すっごく前向きだね。"],"ans":2,"analysis":"問題7（考点：惯用语/意图推断：抱怨） 又是考试又是报告，下周还有发表，这么多事赶在一起，真是没辙了。（お手上げ是“束手无策，投降”的惯用语）","opt_notes":["全部都结束了太好了。（逻辑不符：事情还没做）","哎呀，总会有办法的吧。（得体回应：まあ、何とかなるんじゃない是安慰抱怨者或身处困境者的常用语）","哇，你真积极啊。（逻辑不符：与お手上げ的负面语感相反）"]},{"num":8,"q":"学生の頃、一緒によく行った商店街、なんだか寂れた感じになってたよ。","opts":["そう。前はにぎやかだったのにね。","今も変わらないんだね。","相変わらず、人が多いんだ。"],"ans":1,"analysis":"問題8（考点：意图推断：表达感慨) 学生时代常去的商店街，感觉变得好冷清啊。（寂れた感じ是“萧条，衰败”的感觉，表达物是人非的感慨）","opt_notes":["是啊，以前明明那么热闹。（得体回应：前は〜のにね附和对方的感慨，并进行今昔对比）","现在也没变啊。（逻辑不符：与寂れた的意思相反）","还是和以前一样人很多啊。（逻辑不符：与寂れた的意思相反）"]},{"num":9,"q":"林さん、企画が通るかどうかは、来週の林さんのプレゼンにかかってるからね。","opts":["プレゼンの時間、かかりすぎないようにします。","来週プレゼンしなくてもいいんでしょう加。","うまく行くよう、しっかりプレゼンやります。"],"ans":3,"analysis":"問題9（考点：语法句型/意图推断：激励/施压） 林，企划能否通过，就看你下周的发表了。（~にかかってる表示“取决于...，关键在于...”）","opt_notes":["我会注意别让发表时间太长的。（答非所问：重点是内容，不是时长）","我下周可以不做发表吗？（逻辑不符：这是在推卸责任）","为了能成功，我会好好发表的。（得体回应：理解了自己责任重大，并表达决心）"]},{"num":10,"q":"営業部の山田部長、突然辞めるなんて無責任極まりないですよね。","opts":["本当、見習いたいものですね。","私もあれは理解できません。","責任感ある行動で、頼もしいですよね。"],"ans":2,"analysis":"問題10（考点：语法句型/意图推断：负面评价） 营业部的山田部长，突然辞职真是太不负责任了。（~極まりない是“极其……至极”的书面语，加强语气）","opt_notes":["真的，真值得学习啊。（逻辑不符：与無責任的负面评价相反）","我也无法理解他那种做法。（得体回应：私も~理解できません表示同意对方的负面评价）","是有责任感的行为，真可靠。（逻辑不符：与無責任的负面评价相反）"]},{"num":11,"q":"このセミナーいつも好評だから、資料多めに用意しとくに越したことはないよ。","opts":["人数分だけで十分なんですね。","じゃあ、無駄が出ないよう、少なめにしますね。","数に余裕を持たせて準備しておきます。"],"ans":3,"analysis":"問題11（考点：语法句型） 这个研讨会一直很受欢迎，所以资料多准备一些总没错。（~に越したことはない是“没有比...更好的了”的固定句型，表示强烈的建议）","opt_notes":["只要准备人数份就够了是吧。（逻辑不符：与“多准备”的建议相反）","那为了不浪费，我少准备一些。（逻辑不符：与“多准备”的建议相反）","好的，我会多准备一些以防万一。（得体回应：数に余裕を持たせて是接受“多准备”建议的具体行动）"]},{"num":12,"q":"三田さん、新商品の開発、話流れたの、君に非はないよ。","opts":["あのう、私に責任があるとのご指摘でしょうか。","新商品の開発、進めていただけるんですね。","あっ、お気遣い、ありがとうございます。"],"ans":3,"analysis":"問題12（考点：意图推断：安慰） 三田，新产品开发的事黄了，不是你的错。（君に非はないよ是明确地安慰对方，表示责任不在你）","opt_notes":["那个，您是指出责任在我吗？（逻辑不符：与非はない的意思相反）","新产品的开发可以继续进行了是吧。（逻辑不符：話流れた表示“黄了，取消了”）","啊，谢谢您的关心。（得体回应：お気遣い、ありがとうございます是对他人安慰的标准感谢）"]},{"num":13,"q":"リーさん、大学の文化祭で何かスピーチしてほしいんだけど。日本で学ぶ留学生ならではの。","opts":["留学生の視点で、ですね。","留学生向けの話ってことですね。","私、日本で学ぶ留学生ですけど。"],"ans":1,"analysis":"問題13（考点：语法句型/意图推断：请求） 小李，想请你在大学文化节上讲几句话，讲一些只有在日本学习的留学生才有的内容。（~ならではの表示“独有的，特有的”，是请求的核心条件）","opt_notes":["是从留学生的视角出发，对吧。（得体回应：确认了留学生ならでは这一核心要求）","是说讲给留学生听的话题吧。（理解错误：ならではの是内容，不是对象）","我是在日本学习的留学生。（逻辑不符：这是在陈述事实，而非回应请求）"]}]},{"label":"2017年12月","questions":[{"num":1,"q":"わたし、コンテストに自分の作品応募したんだ。結果が待ち遠しいなあ。","opts":["それで、結果はどうだったの。","あきらめなくてもいいのに。","何だか自信ありそうだね。"],"ans":3,"analysis":"問題1（考点：意图推断：表达期待） 我报名参加了设计大赛，真等不及结果啊。（待ち遠しいなあ直接表达了强烈的期待）","opt_notes":["所以，结果怎么样了？（时态不符：结果还没出来）","明明不用放弃的。（答非所问）","看来你挺有自信的嘛。（得体回应：从对方期待的态度中，推断出其自信）"]},{"num":2,"q":"先日は結構なものを頂戴しまして。","opts":["あちらは差し上げたんですよ。","いいえ、気に入っていただけたらいいんですが。","え、なにをなさったんですか。"],"ans":2,"analysis":"問題2（考点：敬语应用/意图推断：感谢） 前几天承蒙您送的好东西。（結構なものを頂戴しまして是收到礼物后非常郑重的感谢语）","opt_notes":["那个是送给您的。（逻辑不符：这是在强调送礼的事实，不适合作为回应）","哪里，您能喜欢就好了。（得体回应：気に入っていただけたらいいんですが是送礼方回应感谢时的标准谦辞）","诶，您做了什么？（答非所问）"]},{"num":3,"q":"うちの息子、大学卒業したんですけど。仕事探そうともしないんですよ。","opts":["何かほかにやりたいことがあるんじゃないですか。","息子さん、仕事が本当にお好きなんですね。","うーん、就職したくてもできないなんて。"],"ans":1,"analysis":"問題3（考点：意图推断：抱怨/烦恼） 我儿子大学毕业了，却连找工作的念头都没有。（~しようともしない表示“连...的念头/打算都没有”，表达强烈的不满）","opt_notes":["是不是有什么别的事情想做呢？（得体回应：对对方的烦恼表示理解，并提出一种可能性）","您儿子真的很喜欢工作啊。（逻辑不符：与仕事探そうともしない的意思相反）","嗯，想就职也找不到工作啊。（逻辑不符：对方是“不想找”，不是“找不到”）"]},{"num":4,"q":"キムさん、この共同研究はキムさんの緻密な分析なくしては成り立たなかったよ。","opts":["次ぎは分析ちゃんとやるから。","え、なくしてしまったの。","こっちこそいろいろ助けてもらって。"],"ans":3,"analysis":"問題4（考点：语法句型/意图推断：感谢/赞扬） 金，这项共同研究，要是没有你细致的分析是无法成立的。（~なくしては〜ない是“如果没有...就不...”的句型，用于表达感谢和赞扬）","opt_notes":["下次我会好好分析的。（逻辑不符：对方在赞扬而非批评）","诶，弄丢了吗？（陷阱：将なくしては误听为なくしては（弄丢））","我才是，多亏了你很多帮助。（得体回应：こっちこそ是回应感谢和赞扬，并将功劳归于对方的谦虚说法）"]},{"num":5,"q":"前田さん、こんなとこにかばん置いたら躓いちゃうじゃない。","opts":["すみません、邪魔んなんないとこに移します。","いえ、大したかばんじゃありませんから。","忘れないよう気をつけるので、大丈夫です。"],"ans":1,"analysis":"問題5（考点：意图推断：提醒/抱怨） 前田，把包放这儿会绊倒的吧。（~じゃない的降调形式，带有提醒或轻微责备的语气）","opt_notes":["对不起，我把它移到不碍事的地方。（得体回应：接受提醒并立刻采取行动）","不，这不是什么值钱的包。（答非所问）","我会注意不忘的，没关系。（答非所问：重点是“绊倒”，不是“忘记”）"]},{"num":6,"q":"昨日の議事録、課長が今日中に出せって、昨日言っといてほしかったよ。","opts":["昨日言われたんだからしかたないよ。","どうして私が課長に言うの。","急に言われてもねえ。"],"ans":3,"analysis":"問題6（考点：意图推断：抱怨） 昨天的会议记录，课长说要今天之内交，真希望你昨天就告诉我啊。（~てほしかった表示对过去未发生之事的希望，带有抱怨语气）","opt_notes":["既然是昨天被告知的，那就没办法了。（逻辑不符：对方是今天才被告知）","为什么是我去跟课长说？（答非所问）","是啊，突然被告知也难办啊。（得体回应：急に言われてもねえ附和对方的抱怨）"]},{"num":7,"q":"バイト先から勤務时间増やすよう頼まれて、今人手足りないから、断るに断れないんだ。","opts":["無理ならちゃんと言ったほうがいいよ。","へえ、断ったのに増やされたの。","バイト、できるだけたくさんしたいんだね。"],"ans":1,"analysis":"問題7（考点：语法句型/意图推断：困境） 打工的地方拜托我增加工作时间，现在人手不够，想拒绝也拒绝不了。（断るに断れない是“想拒绝但（因某种情况）无法拒绝”的固定句型）","opt_notes":["如果做不到的话，还是好好说出来比较好。（得体回应：针对对方的困境提出建议)","哦，你拒绝了还被增加了时间啊。（逻辑不符：对方是“没能拒绝”）","你想尽可能多地打工啊。（逻辑不符：对方是“想拒绝”）"]},{"num":8,"q":"今日、大学院の面接試験受けてきた、かなり手応えあったよ。","opts":["答えられない質問がかなりあったの。","うまくいったみたいでよかったじゃない。","それじゃちょっと心配だよね。"],"ans":2,"analysis":"問題8（考点：惯用语/意图推断：表达自信） 今天参加了研究生院的面试，感觉相当有把握。（手応えがあった是“有反应，有效果，有把握”的惯用语）","opt_notes":["有很多问题答不上来吗？（逻辑不符：与手応えあった的正面语感相反）","看来进行得很顺利，太好了嘛。（得体回应：对对方的自信表示祝贺）","那样的话有点担心啊。（逻辑不符：与手応えあった的正面语感相反）"]},{"num":9,"q":"この店の料理、見た目もさることながら、味も抜群ですね。","opts":["いいところ一つもありませんか。","目でも舌でも味わいますね。","見た目だっていいじゃないですか。"],"ans":2,"analysis":"問題9（考点：语法句型） 这家店的菜，不仅是外观，味道也超棒。（AもさることながらBも表示“A自不待言，B也……”）","opt_notes":["难道一个优点都没有吗？（逻辑不符：与题意相反）","是啊，视觉和味觉都是享受。（得体回应：目でも舌でも味わえる是对问句内容的诗意化复述和赞同）","外观不也挺好的嘛。（逻辑不符：这是在反驳对外观的否定，但问句是肯定）"]},{"num":10,"q":"さっき部長に聞いたんだけど、来年度は新入社員の採用、見合わせるんだって。","opts":["え、何に合わせるの。","確かに面接で決めるべきだね。","うん、不景気の影響かな。"],"ans":3,"analysis":"問題10（考点：惯用语/意图推断：转述消息） 刚才听部长说，下一年度暂停招聘新员工了。（見合わせる在此意为“暂停，暂缓”）","opt_notes":["诶，要配合什么？（陷阱：将見合わせる误听为合わせる）","确实应该通过面试来决定。（答非所问）","一嗯，是经济不景气的影响吧。（得体回应：对“暂停招聘”这一决定背后的原因进行推测）"]},{"num":11,"q":"お客様、お食事中すみません。こちらのテーブル、相席をお願いしてもよろしいでしょうか。","opts":["あとでもう一人来るんですけど。","あ、席でお金を払うんですね。","えっと、どのテーブルに移るんですか。"],"ans":1,"analysis":"問題11（考点：请求与许可） 客人，在您用餐时打扰了，能请您和别人拼个桌吗？（相席をお願いしてもよろしいでしょうか是请求拼桌的礼貌用语）","opt_notes":["我等下还有一个人要来。（得体回应：解释自己无法拼桌的理由，是委婉的拒绝）","啊，是在座位上结账是吧。（答非所问：相席被误解为与结账相关）","那个，要移到哪个桌子去？（逻辑不符：对方是请别人坐到你这张桌子）"]},{"num":12,"q":"新年会の幹事、森君が申し出てくれなけりゃ、僕がやらされてたよ。","opts":["じゃあ、感謝しないとね。","大変だけど、幹事頑張ってね。","ああ、森君に頼まれたの。"],"ans":1,"analysis":"問題12（考点：语法句型/意图推断：表达庆幸） 新年会的干事，要不是森同学主动请缨，就得我来干了。（~なければ、〜てたよ是反事实假设，表达“多亏了...才没...”的庆幸）","opt_notes":["那可得感谢他啊。（得体回应：感謝しないとね附和对方的庆幸之情）","虽然很辛苦，但干事加油哦。（逻辑不符：对方没当上干事）","啊，是森拜托你做的啊。（逻辑不符：事实是森自己做的）"]},{"num":13,"q":"加藤さん、加藤さんの企画書見たよ。コスト面で改善の余地あるんじゃないかな。","opts":["コスト面についても書いてありますが。","やってみますが、これ以上は難しいかと。","ありがとうございます。ではこの方向で行きます。"],"ans":2,"analysis":"問題13（考点：意图推断：提出修改意见） 加藤，我看了你的企划书，成本方面是不是还有改善的余地？（改善の余地あるんじゃないかな是委婉地提出修改意见）","opt_notes":["成本方面我也写了啊。（答非所问：对方不是说没写，是说需要改善）","我会试试，但再往下压恐怕就难了。（得体回应：接受修改意见，同时说明了客观困难）","谢谢，那我就按这个方向进行了。（逻辑不符：对方要求修改，而非肯定）"]}]},{"label":"2018年7月","questions":[{"num":1,"q":"今度のサークルの合宿ぼくも行きたかったなあ。バイトが入ってなかったらなあ。","opts":["バイトの予定早く決まればいいね。","バイト入ってなかったんだ。じゃ、いけるね。","いっしょに行くのを楽しみにしてたのに。"],"ans":3,"analysis":"問題1（考点：意图推断：遗憾） 这次社团的合宿我也想去啊，要是没排打工就好了。（~たかったなあ、〜たらなあ都是表达遗憾和与事实相反的愿望）","opt_notes":["打工的安排能早点定下来就好了呢。（答非所问）","你没排打工啊，那能去了。（逻辑不符：事实是排了打工）","我还期待着能一起去呢。（得体回应：对对方的遗憾表示共鸣）"]},{"num":2,"q":"伊藤さん、探してたファイル、そこの棚にあるじゃない。","opts":["うん、そこの棚にもないでしょう。","えっ?本当?あった?","早く見つかるといいんだけど。"],"ans":2,"analysis":"問題2（考点：意图推断：提醒） 伊藤，你找的文件，不在那边的架子上嘛。（~じゃない的降调形式，带有提醒对方“你没看到吗”的语气）","opt_notes":["嗯，那边的架子上也没有吧。（逻辑不符：与あるじゃない的意思相反）","诶？真的？找到了？（得体回应：对自己没发现而对方发现了的事实表示惊讶）","要是能快点找到就好了。（逻辑不符：已经找到了）"]},{"num":3,"q":"田中君、さっきの会議での一言、冴えてたね。","opts":["ご期待にそえなくて、すみません。","はあ、一言足りませんでしたか。","いやあ、今日はたまたまです。"],"ans":3,"analysis":"問題3（考点：意图推断：赞赏） 田中，刚才会议上那句话，真是一针见血啊。（冴えてる在此意为“（头脑、言辞）敏锐，精辟”）","opt_notes":["没能达到您的期待，非常抱歉。（逻辑不符：对方在赞扬）","啊，是少说了一句吗？（逻辑不符：与冴えてた的正面评价相反）","哪里哪里，今天只是碰巧了。（得体回应：たまたまです是回应赞扬时的标准谦辞）"]},{"num":4,"q":"ねえ、知ってる。この前いっしょに見た映画で主役だった俳優、あの映画を最後に引退だって。","opts":["もう映画に出ないの?結構好きだったんだけど。","最後はどんな映画に出るんだろうね。","あの映画で引退を思いとどまったんだね。"],"ans":1,"analysis":"問題4（考点：意图推断：转述消息） 你知道吗？之前一起看的电影里演主角的那个演员，演完那部电影就要退圈了。","opt_notes":["他不再演电影了吗？我还挺喜欢他的。（得体回应：对消息表示惊讶和惋惜）","他最后会演一部什么样的电影呢？（逻辑不符：消息是“那部电影是最后一部”）","他因为那部电影而打消了退圈的念头啊。（逻辑不符：与引退だって的意思相反）"]},{"num":5,"q":"新しい会計システムの導入、どうやら一か月ほどずれこむようですよ。","opts":["予定どおりですね。","遅れるのは困りますね。","えっ、早まるんですか。"],"ans":2,"analysis":"問題5（考点：惯用语/意图推断：报告问题） 新会计系统的导入，好像要推迟一个月左右。（ずれ込む是“向后推迟”的意思）","opt_notes":["那就是按计划进行了。（逻辑不符：与ずれ込む的意思相反）","推迟的话就麻烦了。（得体回应：对“推迟”这一负面消息做出反应）","诶？要提前吗？（逻辑不符：与ずれ込む的意思相反）"]},{"num":6,"q":"昨日の打ち上げ、私が余計なこと言ったばかりに、雰囲気が悪くなっちゃったんだ。","opts":["でも、うっかり言わなくてよかったんじゃないの?","そんなに君ばかり話してたんだ。","そう。何言ったの?"],"ans":3,"analysis":"問題6（考点：意图推断：抱怨/自责） 昨天的聚会，都怪我说了多余的话，把气氛搞僵了。（~たばかりに表示“只因为...就导致了不好的结果”，是自责的表达）","opt_notes":["不过，你没不小心说出来不是挺好吗？（逻辑不符：事实是已经说了）","你一个人说了那么多话啊。（答非所问）","是吗，你说了什么？（得体回应：对朋友的自责表示关心并询问具体情况）"]},{"num":7,"q":"テニス部の山田君、優勝を逃して、相当落ち込んでるみたいだよ。","opts":["優勝して目標を失ったんだね。","そっか。残念だったろうね。","だから、機嫌がいいんだね。"],"ans":2,"analysis":"問題7（考点：意图推断：转述负面消息） 网球部的山田，错失了冠军，好像相当失落。（落ち込んでる是“情绪低落，沮丧”）","opt_notes":["他是赢了冠军后失去了目标啊。（逻辑不符：事实是優勝を逃して（错失冠军））","是吗，他一定很遗憾吧。（得体回应：残念だったろうね对听到的坏消息表示同情）","所以他才心情那么好啊。（逻辑不符：与落ち込んでる的意思相反）"]},{"num":8,"q":"白井さん、商品の発送、あんなにあったのに、こんな短时间でこなしてくれたんだね。","opts":["何とか片付きました。","えっ、もう終わりましたけど。","どなたか手伝ってくださったんですか。"],"ans":1,"analysis":"問題8（考点：意图推断：赞赏） 白井，要发送的商品那么多，你这么短时间就处理完了啊。（こなす是“熟练处理，圆满完成”的意思，整句是赞扬）","opt_notes":["总算是处理完了。（得体回应：何とか片付きました是对赞扬的谦虚回应）","诶？已经结束了啊。（逻辑不符：这是在反问，不自然）","有谁来帮忙了吗？（逻辑不符：对方在夸奖你个人）"]},{"num":9,"q":"昨日あなたがやったことは、社会人としてあるまじき行為だよ。","opts":["ありがとうございます。恐れ入ります。","よくあることなんですね。ほっとしました。","申し訳ありません。今後気をつけます。"],"ans":3,"analysis":"問題9（考点：语法句型/意图推断：批评） 你昨天做的事，作为社会人是不应有的行为！（~としてあるまじき行為是书面语中非常严厉的批评）","opt_notes":["谢谢您，不胜惶恐。（逻辑不符：恐れ入ります可用于感谢，但这里是批评）","这是常有的事啊，那我就放心了。（逻辑不符：态度极其不当）","非常抱歉，我今后会注意的。（得体回应：接受批评并郑重道歉）"]},{"num":10,"q":"お客様、本日お店の出口でプレゼントをお配りしています。レシートと引き換えに、お受け取りください。","opts":["レシートを渡せばいいんですね。","レシートは出口でもらえるんですね。","レシートは見せなくていいんですね。"],"ans":1,"analysis":"問題10（考点：意图推断：指示） 客人，今天在店门口分发礼物，请凭收据来换取。（~と引き換えに表示“凭...交换...”，是说明条件）","opt_notes":["把收据给你们就行了是吧。（得体回应：确认指示的内容）","收据是在出口领是吧。（逻辑不符：收据是购物时拿到的）","就是说不用出示收据了是吧。（逻辑不符：与引き換えに的要求相反）"]},{"num":11,"q":"今度入った木村さん、あの仕事ぶりじゃ、先が思いやられるなあ。","opts":["将来性があるってこと？","新人なのに、頼もしいね。","まだ入ったばっかりだから。"],"ans":3,"analysis":"問題11（考点：惯用语/意图推断：负面评价） 新来的木村，看他那工作态度，前途堪忧啊。（先が思いやられる是\"前途令人担忧\"的惯用语）","opt_notes":["是说他很有前途吗？（逻辑不符：与惯用语的意思相反）","明明是新人，真可靠啊。（逻辑不符：与惯用语的意思相反）","毕竟才刚来嘛。（得体回应：为被批评的人进行辩护，是常见的对话模式）"]},{"num":12,"q":"あっ、この張り紙見て、このお寺、事前に予約しておかない限り、見学はできないって書いてあるよ。","opts":["ああ、予約しとかなくてもいいんだ。","ええ、予約しとけばよかったね。","せっかく予約しといたのにね。"],"ans":2,"analysis":"問題12（考点：语法句型） 啊，看这个告示，这家寺庙，不提前预约的话是不能参观的。（〜ない限り表示\"只要不…就（不）…\"，是唯一的条件）","opt_notes":["啊，就是说不预约也行啊。（逻辑不符：与〜ない限り、〜できない的意思相反）","是啊，要是提前预约了就好了。（得体回应：〜ばよかった表达对过去未做之事的后悔）","白白预约了呢。（逻辑不符：事实是没预约）"]},{"num":13,"q":"中田さん、先日のご依頼の件、なかなか厳しいんですが、中田さんからのお話とあってはね。","opts":["ご無理をお願いして申し訳ありません。","やはりだめでしたか。","私はお受けしにくいんですが。"],"ans":1,"analysis":"問題13（考点：语法句型/意图推断：答应请求） 中田，关于前几天您委托的事，虽然很棘手，但既然是您开口……（〜とあってはね表示\"既然是…这个特殊情况就另当别论\"，暗示愿意破例帮忙）","opt_notes":["拜托您为难的事，真不好意思。（得体回应：对对方的通融表示感谢和歉意）","果然还是不行吗？（逻辑不符：对方已经暗示同意）","我也很难接受。（逻辑不符：这是在拒绝，但对方在请求）"]}]},{"label":"2018年12月","questions":[{"num":1,"q":"いろいろ検討しましたが、この契約のお話は、なかったことにさせてください。","opts":["お話しなかったんですか。","今になってそのようなことを言われましても。","では、契約成立ということで。"],"ans":2,"analysis":"問題1（考点：意图推断：正式拒绝） 我们研究了很久，但这次合同的事，请允许我就当没发生过。（なかったことにさせてください是单方面取消约定的郑重说法）","opt_notes":["您没说吗？（答非所问）","事到如今您才说这种话，（我们也很为难）。（得体回应：今になって~言われましても表达了对对方突然变卦的为难和不满）","那么，就当合同成立了。（逻辑不符：与なかったことに的意思相反）"]},{"num":2,"q":"昨日、木村先輩とカラオケ行ったんだけど、もうごりごりだよ。","opts":["なんか大変なことでもあったの。","またいっしょに行くつもり。","いいな。何をおごってもらったの。"],"ans":1,"analysis":"問題2（考点：惯用语/意图推断：抱怨） 昨天和木村前辈去唱K，真是受够了。（こりごりだよ是こりる的强调形式，表示“吃够了苦头，再也不想...”）","opt_notes":["发生什么大変な事了吗？（得体回应：询问对方抱怨的原因）","还打算一起去吗？（逻辑不符：与こりごり的意思相反）","真好啊，他请你什么了？（逻辑不符：おごる是请客，与抱怨的语境不符）"]},{"num":3,"q":"会計士の資格、なんとしても、今年取ってみせるよ。","opts":["応援してるからね。","よく見えるといいな。","おめでとう、頑張ったね。"],"ans":1,"analysis":"問題3（考点：意图推断：表达决心） 会计师资格证，我无论如何今年都要拿到！（なんとしても〜てみせる是表达强烈决心的句型）","opt_notes":["我支持你哦。（得体回应：応援してるからね是对对方的决心表示支持）","要是能看清楚就好了。（陷阱：将取ってみせる误听为撮って見せる（拍照给人看））","恭喜，你努力了啊。（时态不符：对方还未成功）"]},{"num":4,"q":"ランチによさそうな店、みつけたんだけど。この後、先約ある?","opts":["あ、予約はまだなんですけど。","用于、同期の仲間と、すみません。","この先には店はないと思います。"],"ans":2,"analysis":"問題4（考点：意图推断：委婉拒绝） 我找到一家看似不错的午餐店，不过你这之后有约吗？（先約ある？是在发出邀请前，先确认对方是否方便）","opt_notes":["啊，我还没预约。（逻辑不符：先約指“事先的约定”，非“预约”）","那个，和同事有约了，不好意思。（得体回应：承认有先約，并委婉拒绝）","我觉得这前面没有店了。（答非所问）"]},{"num":5,"q":"課長、さっきの件、わたし、課の皆が何と言おうと、反対といったら反対です。","opts":["皆そういってるの?","ちなみに、君は賛成?反対?","何が何でも反対ってこと。"],"ans":3,"analysis":"問題5（考点：意图推断：表达强烈意志） 课长，关于刚才那件事，不管课里大家怎么说，我说了反对就是反对。（反対といったら反对です是强调自己绝不改变主意的强硬说法）","opt_notes":["大家都是那么说的吗？（逻辑不符：说话人强调的是个人意见）","顺便问下，你是赞成还是反对？（逻辑不符：对方已经明确表示反对）","就是说无论如何都反对是吧。（得体回应：确认对方的强硬立场）"]},{"num":6,"q":"あのう、ファイルの整理は、もうすこしてきぱきやってもらえますか。","opts":["間違いに気づかず、すみません。","適当にやったつもりはないんですが、すみません。","要領がつかめなくて、すみません。"],"ans":3,"analysis":"問題6（考点：拟声拟态词/意图推断：请求/批评） 那个，整理文件能请你再麻利一点吗？（てきぱき是形容动作“麻利，利索”，てもらえますか是请求，但带有不满）","opt_notes":["没注意到错误，对不起。（答非所问：批评的是“速度”，不是“正确性”）","我并没打算随便做做，对不起。（答非所问：適当に是“马虎”，但这里说的是てきぱき（速度））","还没掌握要领，对不起。（得体回应：解释自己动作慢的原因并道歉）"]},{"num":7,"q":"週末、中学生の姪が遊びに来るんだけど、どこつれてったらいいか見当もつかないよ。","opts":["中学生なら、それがいいんじゃない。","本人に希望聞いてみたら。","それじゃ、楽しい週末だったでしょう。"],"ans":2,"analysis":"問題7（考点：惯用语） 周末我上中学的侄女要来玩，但我完全不知道该带她去哪儿。（見当もつかない是“毫无头绪，完全想不到”的惯用语）","opt_notes":["如果中学生，那个就不错。（逻辑不符：それ指代不明）","问问她本人想去哪儿怎么样？（得体回应：提出合理的建议）","那一定是个愉快的周末吧。（时态不符：事情还未发生）"]},{"num":8,"q":"この絵、山田さんが描いただけあって、豪快だよね。","opts":["山田さんの作品なのにね。","人柄出てるよね。","あえで豪快に描いてみたんだね。"],"ans":2,"analysis":"問題8（考点：语法句型/意图推断：赞赏） 这幅画，真不愧是山田画的，非常豪放啊。（~だけあって表示“正因为...，不愧是...”，是赞赏的句型）","opt_notes":["明明是山田的作品呢。（逻辑不符：~のに用于表达与预期相反的结果）","是啊，体现出他的性格了呢。（得体回应：人柄出てる附和对方的评价）","他是故意画得豪放的吧。（逻辑不符：外だけあって强调的是自然流露）"]},{"num":9,"q":"今日は朝からろくなことないんだ。","opts":["ついてない日ってあるよね。","わたしだって何もないよ。","へえ、うらやましいなあ。"],"ans":1,"analysis":"問題9（考点：惯用语/意图推断：抱怨） 今天从早上起就没一件好事。（ろくなことない是“没（一件）好事”的惯用语，表达抱怨）","opt_notes":["是变，人就是有倒霉的时候。（得体回应：ついてない日ってあるよね表示同情和共鸣）","我也什么事都没有啊。（逻辑不符：何もない是“没事”，与ろくなことない（倒霉）不同）","哇，真羡慕啊。（逻辑不符：与抱怨的语气相反）"]},{"num":10,"q":"この間のトラブル、解決のめどは立ちましたか。","opts":["ありがとうございます。助かります。","まだ立て終わってないんです。","まあ、何とかなりそうです。"],"ans":3,"analysis":"問題10（考点：惯用语） 前几天的纠纷，有解决的眉目了吗？（めどが立つ是“有眉目，有希望”的惯用语）","opt_notes":["谢谢您，帮大忙了。（答非所问）","还没立完。（陷阱：将立つ字面理解为“树立”）","嗯，感觉总会有办法的。（得体回应：何となりそう表示事情有解决的希望，与めどが立つ吻合）"]},{"num":11,"q":"部長、りんさんの初めての商談、同行しましたが、手助けするまでもなかったです。","opts":["一人でやれたなんて、たいしたもんだ。","やっぱり商谈やらせるのは早すぎたね。","じゃあ、りんさんは何も手伝おうとしなかったの。"],"ans":1,"analysis":"問題11（考点：语法句型/意图推断：赞赏） 部长，我陪同了小林的第一次商务谈判，根本用不着我帮忙。（~までもなかった表示“没必要到...的程度”，在此是赞扬小林能力强）","opt_notes":["一个人就能搞定，真了不起。（得体回应：たいしたもんだ是对小林能力的赞扬）","果然让他去谈判还太早了啊。（逻辑不符：与问句的赞扬意图相反）","那就是说小林什么忙都没帮咯？（逻辑不符：主次颠倒）"]},{"num":12,"q":"ねえ、午後4時の時点での今日の売り上げ、出た?","opts":["えっと、今日の売り上げ目標ですね。","えっと、4時から今までの集計ですね。","えっと、4时までの売り上げですね。"],"ans":3,"analysis":"問題12（考点：意图推断：询问） 喂，今天截至下午4点的销售额，统计出来了吗？（~時点での表示“截至……时间点”）","opt_notes":["嗯，是今天的销售目标是吧。（理解错误：问的是売り上げ（销售额），不是目標（目标））","嗯，是4点到现在的统计是吧。（理解错误：问的是4時の時点まで（截至4点））","嗯，是截至4点的销售额是吧。（得体回应：确认了询问的具体内容）"]},{"num":13,"q":"わたし、この実験結果が出るまで、気が気じゃないよ。","opts":["まぁ、なるようになるよ。","ちょっと安心しすぎなんじゃない。","ぼくもそんな気ないよ。"],"ans":1,"analysis":"問題13（考点：惯用语/意图推断：担忧） 我啊，在这个实验结果出来之前，一直坐立不安。（気が気じゃない是“焦急，担心得不得了”的惯用语）","opt_notes":["哎呀，顺其自然吧。（得体回应：なるようになるよ是安慰担忧的人的常用语）","你是不是有点太放心了？（逻辑不符：与気が気じゃない的意思相反）","我也没那个打算。（答非所问：そんな気ないよ的気与気が気じゃない的気含义不同）"]}]},{"label":"2019年7月","questions":[{"num":1,"q":"ああ、藤田監督の五年ぶりの映画、公開待ち遠しいよね。","opts":["早いね。もう見ちゃったの?","そうだね。早く見たいね。","ええ。見たかったのに、残念。"],"ans":2,"analysis":"問題1（考点：意图推断：寻求共鸣） 啊，藤田导演时隔五年的电影，真等不及要上映了啊。（待ち遠しい表达了对未来事件的强烈期待感）","opt_notes":["真快啊，已经看过了？（时态不符：~ちゃったの？是完成体，与表示未来的待ち遠しい矛盾）","是啊，真想快点看到啊。（得体回应：そうだね表示同意、早く見たいね是分享和呼应对方待ち遠しい心情的自然表达，是典型的相槌（附和）用法）","是啊，本来想看的，真遗憾。（场景不符：~たかったのに用于表达对过去未能实现之事的遗憾，与期待未来的语境不符）"]},{"num":2,"q":"営業部に新しく入った山田君って能力もさることながら、努力家だよね。","opts":["うん、優秀だし、本当に頑張ってるよね。","うーん、力が足りないのは仕方ないよ。","えっ、努力すれば伸びると思うよ。"],"ans":1,"analysis":"問題2（考点：语法句型/意图推断：赞赏） 营业部新来的山田，能力自不必说，还是个努力家啊。（AもさることながらB是“A固然...但更...”的句型，用于强调B）","opt_notes":["嗯，既优秀又真的很努力啊。（得体回应：優秀だし、本当に頑張ってる分别对应了A和B，表示完全同意）","嗯，能力不足也没办法。（逻辑不符：与能力もさることながら的正面评价相反）","诶，我觉得努力的话会有进步的。（逻辑不符：这是在安慰能力不足的人，但问句是赞扬）"]},{"num":3,"q":"先生、明日のリーさんの送別会、最後に一言頂戴したいんですが。","opts":["2、3分でいいですか。","もちろん差し上げますよ。","リーさんから挨拶があるんですね。"],"ans":1,"analysis":"問題3（考点：敬语应用/请求与许可） 老师，明天的欢送会，想请您最后讲几句话。（一言頂戴したいんですが是请求对方（上级）发言的谦让表达）","opt_notes":["两三分钟就可以吗？（得体回应：作为被请求方，确认发言的具体要求）","当然要给您。（用词错误：差し上げる是“给予”，但对方是请求自己发言）","是说小李要致辞是吧。（逻辑不符：请求的对象是老师自己）"]},{"num":4,"q":"先輩、去年の消費者アンケート見当たりません。この部屋の棚という棚を探したんですが。","opts":["ええと、この部屋のほかの棚もちゃんと探して。","そう。念のため、隣の部屋も確認してくれる?","えつ、棚、見つかんなかったの?"],"ans":2,"analysis":"問題4（考点：语法句型/意图推断：报告问题） 前辈，去年的消费者问卷找不到了，这个房间的架子我翻了个遍。（棚という棚是“所有的架子”的强调说法，見当たらない表示遍寻不获）","opt_notes":["嗯，这个房间别的架子也好好找找。（逻辑不符：对方已经说了棚という棚を探した（所有架子都找了））","是吗，为防万一，能帮忙确认下隔壁房间吗？（得体回应：接受了“这个房间没有”的信息，并提出下一步的解决方案）","诶？架子没找到吗？（逻辑不符：找不到的是问卷，不是架子）"]},{"num":5,"q":"昨日のテニスの決勝、見ていて、手に汗握る試合だったね。","opts":["ああ、安心して見てられたよね。","えっ、つまらない試合だった?","本当、ハラハラしたね。"],"ans":3,"analysis":"問題5（考点：惯用语/意图推断：寻求共鸣） 昨天的网球决赛，看得我手心都出汗了。（手に汗握る是形容“场面紧张、激动人心”的惯用语）","opt_notes":["啊，看得很安心呢。（逻辑不符：与手に汗握る的紧张感相反）","诶？是场无聊的比赛吗？（逻辑不符：与手に汗握る的兴奋感相反）","真的，提心吊胆的。（得体回应：ハラハラした与手に汗握る语意相近，形容紧张刺激）"]},{"num":6,"q":"黒田さん、この資料、印刷する前に見せてって私言ったじゃないですか。","opts":["申し訳ありません。うっかりしてました。","お見せしなくてもいいんですか。","私はそんなこと言っていませんが。"],"ans":1,"analysis":"問題6（考点：意图推断：责备） 黑田，这份资料，我不是说了让你印刷前给我看的吗？（~って言ったじゃないですか是带有责备语气的提醒和确认）","opt_notes":["非常抱歉，我不小心忘了。（得体回应：うっかりしてました是承认自己疏忽并道歉）","不给您看也可以吗？（逻辑不符：这是在反问，态度不当）","我没说过那种话。（逻辑不符：这是在否认，会激化矛盾）"]},{"num":7,"q":"この前買った新しいソファー、なんか部屋にしっくりこないんだ。","opts":["うちに帰るの、楽しみだね。","雰囲気に合わないってこと?","じゃあ、どうやって部屋に入れるの。"],"ans":2,"analysis":"問題7（考点：惯用语/意图推断：抱怨） 前阵子买的新沙发，总觉得和房间不搭。（しっくりこない是“不协调，不搭调”的惯用语）","opt_notes":["回家真让人期待啊。（答非所问：未回应しっくりこない这一核心问题）","是说和氛围不搭吗？（得体回应：~ってこと?是用于确认对方话语中模糊部分的含义，这里是针对しっくりこない的具体内容进行确认，是自然的对话流程）","那要怎么搬进房间？（场景不符：对方已经買った（买了），沙发已在房间里）"]},{"num":8,"q":"新しいサービスの提案書、一緒に案を練ってもらったけど、会議で没になったよ。","opts":["採用されたんですね。","何が問題だったんでしょうか。","結果はいつ出るんですか。"],"ans":2,"analysis":"問題8（考点：意图推断：报告坏消息） 新服务的提案书，虽然你也帮忙一起构思了，但在会上被否了。（没になった表示“被否决，不采用”）","opt_notes":["被采用了啊。（逻辑不符：与没になった的意思相反）","是哪里有问题呢？（得体回应：对负面结果表示关心并询问原因）","结果什么时候出来？（逻辑不符：结果已经出来了）"]},{"num":9,"q":"貸してくれたDVD見たよ。最後の結末には意表を突かれたよ。","opts":["えっ、最後、驚かなかったの?","予想外の展開だったでしょう。","疲れるほど長い話じゃないと思うけど。"],"ans":2,"analysis":"問題9（考点：惯用语/意图推断：正面评价） 你借我的DVD我看了，最后的结局真是出人意料。（意表を突かれる是“出乎意料”的惯用语）","opt_notes":["诶？你最后不惊讶吗？（逻辑不符：与意表を突かれた的意思相反）","是个意想不到的展开吧。（得体回应：予想外の展開是对意表を突かれた的附和与确认）","我觉得这不是个长到会累的故事。（答非所问）"]},{"num":10,"q":"出張で泊まったホテル、ネットの口コミを見る限りでは、評判よかったんだけどね。","opts":["ええ、なんで口コミ見て決めなかったの?","へえ、口コミ通りだったんだね。","そう。ネットの口コミってあてにならないよね。"],"ans":3,"analysis":"問題10（考点：语法句型/意图推断：抱怨） 出差住的酒店，就网上评论来看的话，评价还挺好的……（~限りでは表示“仅就...范围来看”，句末的~んだけどね暗示了“但事实并非如此”）","opt_notes":["诶，你为什么没看评论再决定？（逻辑不符：对方看了）","哦，和评论说的一样啊。（逻辑不符：暗示了事实与评论不符）","是啊，网上的评论真靠不住。（得体回应：准确捕捉到了对方的言外之意并表示共鸣）"]},{"num":11,"q":"同窓会で幹事をやらされる羽目になっちゃったよ。","opts":["大変だろうけど、いい経験になると思うよ。","えっ、引き受けたらよかったのに。","あっ、ほかにやってくれる人見つかったんだ。"],"ans":1,"analysis":"問題11（考点：语法句型/意图推断：抱怨） 结果落得要在同学会上当干事的下场。（~羽目になっちゃった是“陷入...的窘境/下场”的句型，表达了非自愿的负面结果）","opt_notes":["虽然很辛苦，但我觉得会是很好的经验。（得体回应：对对方的抱怨进行安慰和鼓励）","诶，要是你接受了就好了。（逻辑不符：对方是被迫接受）","啊，找到别人来做了啊。（逻辑不符：事实是自己要做）"]},{"num":12,"q":"今回の取引先との交渉、森田課長が助けてくれなければ成立しなかったよね。","opts":["課長って頼りになるよね。","課長が助けてくれないとはね。","助けてもらったのに、うまくいかなかったね。"],"ans":1,"analysis":"問題12（考点：语法句型/意图推断：感谢/赞扬） 这次和客户的谈判，要不是森田课长帮忙，是不会成功的吧。（~なければ〜なかったよね是反事实假设，表达“多亏了...才成功”的感谢和赞扬）","opt_notes":["课长真靠得住啊。（得体回应：附和对方对课长的赞扬）","真没想到课长不帮忙啊。（逻辑不符：事实是帮忙了）","明明帮你忙了，却没成功啊。（逻辑不符：事实是成功了）"]},{"num":13,"q":"中野さん、一人で旅行に行くって聞いたけど、行き慣れたところでも用心するに越したことはないよ。","opts":["確かに、よく行く場所なら安心ですね。","うーん、気を付けたほうがいいですよ。","ありがとうございます。油断しないようにします。"],"ans":3,"analysis":"問題13（考点：语法句型/意图推断：提醒/建议） 中野，听说你一个人去旅行，但即便是常去的地方，多加小心总没错。（~に越したことはない是“没有比...更好的了”的句型）","opt_notes":["确实，常去的地方就放心了。（逻辑不符：与“要小心”的建议相反）","嗯，你还是小心点比较好。（角色混淆：这是建议别人时说的话）","谢谢，我会注意不掉以轻心的。（得体回应：油断しないようにします接受了对方的提醒和建议）"]}]},{"label":"2019年12月","questions":[{"num":1,"q":"コーチ、この雨じゃ、試合中止さ、やむを得ないですよね。","opts":["じゃ、やむまでやりましょう。","これじゃ、無理ですね。","ああ、雨、止みそうですか。"],"ans":2,"analysis":"問題1（考点：语法句型/意图推断：寻求共鸣） 教练，这雨这么大，比赛中止也是没办法的事吧。（やむを得ない是“不得已，没办法”的固定表达）","opt_notes":["那就下到停为止吧。（陷阱：将やむを得ない的やむ误解为雨“停止”）","是啊，这样下是没法比了。（得体回应：これじゃ、無理ですね同意对方的看法）","啊，雨快停了吗？（逻辑不符：问句的前提是雨很大）"]},{"num":2,"q":"先作ってくれたこの見積書、合計金額が抜けてるよ。","opts":["すみません、計算が間違ってましたか。","すみません、合計書かないほうがよかったんですね。","すみません、書き入れて出し直します。"],"ans":3,"analysis":"問題2（考点：意图推断：指出错误） 之前你做的这份报价单，合计金额漏掉了。（直接指出文件中的错误）","opt_notes":["对不起，是计算错了吗？（逻辑不符：错误是“漏掉”，不是“算错”）","对不起，是不该写合计金额吗？（逻辑不符：错误是“漏掉”，不是“不该写”）","对不起，我补上再重新交。（得体回应：承认错误并提出补救措施）"]},{"num":3,"q":"このお菓子、材料にこだわってるからっていい値段したけど、それだけのことはあるよね。","opts":["期待を裏切らないね。","材料にこだわってるのにね。","いいのは値段だけってことだね。"],"ans":1,"analysis":"問題3（考点：语法句型/意图推断：正面评价） 这个点心，因为材料很讲究所以价格不菲，但确实物有所值啊。（~だけのことはある表示“正因为……不愧是……”，是正面评价）","opt_notes":["是啊，没辜负期待。（得体回应：期待を裏切らないね是对それだけのことはある的附和）","明明材料很讲究呢。（逻辑不符：~在线用于表达与预期相反的结果）","就是说只有价格好咯。（逻辑不符：与正面评价相反）"]},{"num":4,"q":"あ、山下さん、こんなところでお会いするなんて。","opts":["あ、待っててくださったんですか。","本当、思いもしませんでした。","先もここでお会いしましたっけ。"],"ans":2,"analysis":"問題4（考点：意图推断：表达意外） 啊，山下，真没想到会在这种地方遇见您。（こんなところでお会いするなんて表达了偶遇的意外之情）","opt_notes":["啊，您是在等我吗？（逻辑不符：对方是偶遇）","是啊，我也完全没想到。（得体回应：思いもしませんでした附和了对方的意外之情）","我们之前也在这里见过吗？（答非所问）"]},{"num":5,"q":"木村さん、今日のプレゼンもまったく危なげない出来でしたね。","opts":["そんなことないです。緊張しちゃって。","毎回ひやひやさせてすみません。","危なかったですか。気が付きませんでした。"],"ans":1,"analysis":"問題5（考点：惯用语/意图推断：赞赏） 木村，今天的发表也完成得非常稳健，无可挑剔。（危なげない是“稳健的，没有危险的”，是正面评价）","opt_notes":["哪里哪里，我紧张得不行。（得体回应：回应赞扬时的标准谦辞）","每次都让您提心吊胆的，对不起。（逻辑不符：与危なげない的意思相反）","很危险吗？我没注意到。（逻辑不符：与危なげない的意思相反）"]},{"num":6,"q":"田中さん、部長今海外出張から戻ったと思ったらまた出てったけど、なに?","opts":["じゃ、出張から戻ったら教えて。","トラブルがあって、その対応みたい。","え、これからまた海外に行くの。"],"ans":2,"analysis":"問題6（考点：意图推断：询问） 田中，部长刚从海外出差回来，我以为他在，结果又出去了，什么事？（~と思ったら~表示前后两件事接连发生，超出预想）","opt_notes":["那等他出差回来你告诉我。（答非所问）","好像是出了点问题，去处理了。（得体回应：回答了对方关于“什么事”的提问）","诶，他接下来又要去海外吗？（逻辑不符：问的是“刚才出去”的原因）"]},{"num":7,"q":"この海の絵、子供ならではの感性で描かれてて面白いですね。","opts":["本当、まるで子供が描いたみたいですね。","子供の発想って本当に素晴らしいですね。","確かに子供ならもっと自由に描くでしょうね。"],"ans":2,"analysis":"問題7（考点：语法句型/意图推断：赞赏） 这幅海的画，画得很有趣，充满了孩子才有的感性。（~ならではの表示“独有的，特有的”）","opt_notes":["真的，简直就像是小孩子画的。（逻辑不符：这是在贬低画作幼稚）","是啊，孩子的想象力真的很棒。（得体回应：附和了对子供ならではの感性的赞扬）","确实，如果是孩子的话会画得更自由吧。（逻辑不符：这是在提出不同看法）"]},{"num":8,"q":"山田さん、君、新しい企画の担当、買って出たんだって。","opts":["それが結局かえなかったんです。","ぜひやってみたいと思いまして。","え、今度そんな企画が出たんですか。"],"ans":2,"analysis":"問題8（考点：惯用语/意图推断：确认） 山田，听说你主动承担了新企划的负责人？（買って出る是“主动承担，自告奋勇”的惯用语）","opt_notes":["那个结果没能买成。（陷阱：将買って出る误解为“买”）","是的，因为我非常想试一试。（得体回应：确认事实并说明动机）","诶，这次有那样的企划吗？（逻辑不符：这是在反问，与事实不符）"]},{"num":9,"q":"ゼミの加藤さんと鈴木さん、最近ぎくしゃくしてない?","opts":["何かもめたのかな。","え、二人で一緒に?","確かに忙しそうにしてる。"],"ans":1,"analysis":"問題9（考点：拟声拟态词/意图推断：担忧） 研讨会的加藤和铃木，最近关系是不是有点僵？（ぎくしゃくしてない？是形容人际关系“不和睦，僵硬”）","opt_notes":["是不是吵架了啊。（得体回应：对指ぎくしゃく的原因进行推测）","诶，他们俩一起？（答非所问）","确实，他们看起来很忙。（逻辑不符：ぎくしゃく指关系，非忙碌）"]},{"num":10,"q":"昨日出してくれた新商品の企画書、よかったよ。まあ、商品名はありきたりと言えなくもないけど。","opts":["あの、よかったの、商品名だけでしょうか。","いいえ、似たような商品名もたくさんあるはずです。","商品名もう一度考え直します。"],"ans":3,"analysis":"問題10（考点：语法句型/意图推断：提出修改意见） 昨天给我的新产品企划书，挺好的。不过，商品名嘛，也不能说不老套。（~と言えなくもない是双重否定，表示“也不是不能说...”，是委婉地批评）","opt_notes":["那个，您是说只有商品名好吗？（逻辑不符：对方批评的是商品名）","不，应该也有很多类似的商品名。（答非所问）","我会重新再考虑一下商品名。（得体回应：理解了对方的批评并表示会修改）"]},{"num":11,"q":"初めての登山で雪山に登るなんて、田中くんの挑戦、むちゃにもほどがあるよね。","opts":["いったい何考えてるんだろうね。","そんなむちゃなこと言わないでよ。","感心するほどのことじゃないよ。"],"ans":1,"analysis":"問題11（考点：语法句型/意图推断：负面评价） 第一次登山就去挑战雪山，田中的这个挑战也太鲁莽了吧。（~にもほどがある是“太......也要有个度”的句型，表达强烈的负面评价）","opt_notes":["真不知道他到底在想什么。（得体回应：附和对方的负面评价）","你别说那么鲁莽的话。（逻辑不符：这是在制止对方，而非参与讨论）","这不是什么值得佩服的事。（逻辑不符：语气不自然）"]},{"num":12,"q":"森さん、森さんたちが作ったソフトウェア、発売前なのに、問い合わせひっきりなしだって。","opts":["少しは人気が出てもいいのになあ。","いや、問い合わせはゼロじゃないよ。","なんだかものすごい反響なんだよ。"],"ans":3,"analysis":"問題12（考点：惯用语/意图推断：报告好消息） 森，你们做的软件，明明还没发售，咨询就络绎不绝了。（ひっきりなし是“接连不断，络绎不绝”）","opt_notes":["要是能稍微有点人气就好了。（逻辑不符：事实是人气很高）","不，咨询也不是零。（逻辑不符：ひっきりなし远超于“不是零”）","是啊，反响好像特别大。（得体回应：ものすごい反響是对ひっきりなし的同意和强调）"]},{"num":13,"q":"今日って、何か急ぎの案件抱えてたりする?","opts":["まだ何も考えてません。","特にないですが、なんでしょうか。","今日は荷物は持ってきてないです。"],"ans":2,"analysis":"問題13（考点：惯用语/意图推断：询问） 你今天有什么急事要处理吗？（案件を抱える是“手头有案子/事情”的固定搭配）","opt_notes":["我还没考虑任何事。（答非所问）","没什么特别的，怎么了？（得体回应：先回答问题，再反问对方的意图）","我今天没带行李。（陷阱：将案件误听为与行李相关）"]}]},{"label":"2020年12月","questions":[{"num":1,"q":"木村さん、この資料、会議までに目を通しといてね。","opts":["あ、読んでおきます。","え、わたしが直すんですか。","確認、よろしくお願いします。"],"ans":1,"analysis":"問題1（考点：意图推断：指示） 木村，这份资料，会议前你看一下。（~といてね是~ておいてね的口语形式，是上级对下级的轻松指示）","opt_notes":["啊，我会看的。（得体回应：読んでおきます表示接受指示）","诶，是我来修改吗？（逻辑不符：指示是目を通す（过目），不是直す（修改））","拜托您确认了。（角色混淆：这是请求上级确认时说的话）"]},{"num":2,"q":"駅前にできたレストラン行ってみたけど、二度と行くもんかって思った。","opts":["もう二度も行ったの?","へえ、そんなに気にいったの?","なんで、サービスがひどかったの?"],"ans":3,"analysis":"問題2（考点：语法句型/意图推断：负面评价） 去试了站前的餐厅，我心想再也不去了。（~ものか的口语形式~もんか、表示强烈的否定意志，“绝不...，才不...）","opt_notes":["你已经去过两次了？（逻辑不符：二度と表示“再也（不）”）","哦，那么喜欢啊？（逻辑不符：与强烈的否定意志相反）","为什么，服务很差吗？（得体回应：对对方的强烈负面评价询问原因）"]},{"num":3,"q":"会議中に居眠りして、もう君ぐらいだよ。","opts":["あ、ほかにもいましたか。","何を考えているでしょうかね。","すみません、以後気をつけます。"],"ans":3,"analysis":"問題3（考点：意图推断：批评） 开会时打瞌睡的，也就只有你了。（〜ぐらいだよ在此加强了批评的语气，意为“只有你这样”）","opt_notes":["啊，还有别人吗？（逻辑不符：重点是自己被批评）","他在想什么呢？（答非所问）","对不起，我今后会注意的。（得体回应：接受批评并道歉）"]},{"num":4,"q":"お客さま、随分髪伸びましたね。今日はどのようにいたしますか。","opts":["プレゼント用なので、华やかにしてください。","一口大の大きさに切っていただけますか。","後ろをすこし短めでお願いします。"],"ans":3,"analysis":"問題4（考点：敬语应用/意图推断：询问） 客人，您的头发长了不少呢，今天打算怎么做？（どのようになさいますか是理发师等服务人员询问顾客要求的标准敬语）","opt_notes":["因为是送礼用的，请弄得华丽一些。（答非所问：这是包装礼物时的要求）","能帮我切成一口大小吗？（答非所问：这是对食材的要求）","后面请帮我剪短一些。（得体回应：直接回答了关于发型的要求）"]},{"num":5,"q":"今日が締切の心理学のレポート、まとめるの難しかったよ。出すことは出したんだけどね。","opts":["レポート自信あるんだね。","とりあえず出せたんだからよかったんじゃない。","早く出しに行ったほうがいいよ。"],"ans":2,"analysis":"問題5（考点：意图推断：表达不完全满意） 今天截止的心理学报告，总结起来真难啊。虽然是交了……（出すことは出したんだけどね承认事实，但句末的けどね暗示对结果不满意）","opt_notes":["你对报告很有自信嘛。（逻辑不符：与不满意的语感相反）","总之能交上去不就挺好吗。（得体回应：对对方的不满进行安慰）","你还是快点去交比较好。（逻辑不符：事实是已经交了）"]},{"num":6,"q":"鈴木くん、このケーキ食べてみて、これ、砂糖をいっさい使わずに作ったんだよ。","opts":["たくさん入れたんだ。甘すぎない?","へへえ、砂糖とほかに何入れたの?","え?まったく入っていないの?"],"ans":3,"analysis":"問題6（考点：语法句型） 铃木，尝尝这个蛋糕，这个做的时候一点糖都没用。（~をいっさい使わずに是“完全不使用...”的意思）","opt_notes":["放了很多啊，不会太甜吗？（逻辑不符：与いっさい使わず的意思相反）","哦？除了糖还放了什么？（逻辑不符：前提是没放糖）","诶？真的一点都没放？（得体回应：对いっさい使わず这一事实表示惊讶和确认）"]},{"num":7,"q":"先生、僕絶対第一志望の大学に合格してみせます。","opts":["受かると思いましたよ。おめでとう。","頑張ってください。応援してますよ。","気を落とさないでください。"],"ans":2,"analysis":"問題7（考点：意图推断：表达决心） 老师，我绝对要考上第一志愿的大学！ (~てみめます表示强烈的决心)","opt_notes":["我就知道你能考上，恭喜。（时态不符：对方还未成功）","请加油，我支持你。（得体回应：応援してますよ是对学生决心表示支持的标准说法）","请不要灰心。（逻辑不符：对方充满决心）"]},{"num":8,"q":"野原さん、今月の売上目標の達成は野原さんの活躍によるものだといっても過言じゃないよ。","opts":["お褒めいただき恐縮です。","申し訳ありません。わたしの責任です。","残念です。みんなで頑張ったんですが。"],"ans":1,"analysis":"問題8（考点：语法句型/意图推断：赞扬） 野原，这个月销售目标的达成，说是你的功劳也不为过。（~といっても過言じゃない是“说是...也不为过”的句型，是高度赞扬）","opt_notes":["承蒙夸奖， で揉めてる表示“因是否...而争执不下”）","opt_notes":["嗯，在决定下来之前都静不下心呢。（得体回应：对“争执不下”的状况表示担忧）","あ，就是说不合并了啊。（逻辑不符：事情还未决定）","诶，决定合并了啊。（逻辑不符：事情还未决定）"]},{"num":4,"q":"知ってた?このお寺、釘は一切使われていないんだって。","opts":["え、釘のほかに何を使ってるの?","ああ、たくさん使ったんだね。","へえー、一本も使わずに?"],"ans":3,"analysis":"問題4（考点：语法句型） 你知道吗？这座寺庙，据说完全没有使用钉子。（~は一切使われていない是“完全没被使用”的意思）","opt_notes":["诶，除了钉子还用了什么？（逻辑不符：对方说的是没用钉子）","ああ，用了很多啊。（逻辑不符：与一切使われていない的意思相反）","哦？一根都没用？（得体回应：对一切使われていない的事实表示惊讶和确认）"]},{"num":5,"q":"駅前にできたラーメン屋に行ったけど、1時間並んでまで食べるほどじゃなかったよ。","opts":["並んだ甲斐があったね。","結局食べられなかったんだ。","期待外れだったんだね。"],"ans":3,"analysis":"問題5（考点：语法句型/意图推断：负面评价） 去了站前的拉面店，但感觉不值得排一小时队去吃。（~ほどじゃなかった表示“没有到...的程度”，是负面评价）","opt_notes":["排队排得值了啊。（逻辑不符：与〜ほどじゃなかった的意思相反）","结果没吃到啊。（逻辑不符：事实是吃了）","期待落空了啊。（得体回应：期待外れだったんだね是对对方负面评价的理解和转述）"]},{"num":6,"q":"昨日聴いた森さんが歌うの、プロ顔負けだね。","opts":["へえー、そんなに上手なんですか?","プロと比べられないのは当然ですよ。","え?森さんってプロを目指してたんですか?"],"ans":1,"analysis":"問題6（考点：惯用语/意图推断：赞赏） 昨天听了森唱歌，简直是专业级的水平。（プロ顔負け是“水平高到让专家都汗颜”的惯用语）","opt_notes":["哦？有那么厉害吗？（得体回应：对高度赞扬表示惊讶 and 确认）","和专业人士没法比是当然的。（逻辑不符：顔負け是说水平堪比专业）","诶？森的目标是成为专业歌手吗？（答非所问）"]},{"num":7,"q":"ミドリ電機に新事業の提案書を持って行ったけど、目を通そうともしてくれなくて･･･。","opts":["一応、目を通してはくれたんだ。","へえー、まったく読んでもらえなかったんだ。","そうか、受け入れてくれたんだね。"],"ans":2,"analysis":"問題7（考点：语法句型/意图推断：报告坏消息） 我把新事业的提案书拿去了绿电机，但他们连看都懒得看...（~ようともしてくれない表示“连...的意愿都没有”，表达了对方的冷淡和自己的失望）","opt_notes":["总之还是看了一眼啊。（逻辑不符：与ようともしない的意思相反）","哦，完全没给你看啊。（得体回应：确认了对方话语的核心信息）","是吗，他们接受了啊。（逻辑不符：与ようともしない的意思相反）"]},{"num":8,"q":"今日の美術展、すごい人だったね。前もってチケット买っておかなかったら、入れなかったよね。","opts":["事前に買っておいてよかった。","早めに買っておくべきだったね。","事前に買う必要はなかったね。"],"ans":1,"analysis":"問題8（考点：语法句型/意图推断：庆幸） 今天的美术展人真多啊，要不是提前买了票，就进不去了。（~なかったら、〜なかったよね是反事实假设，表达“多亏...才没...”，带有庆幸的语气）","opt_notes":["提前买好真是太好了。（得体回应：~てよかった是对庆幸语气的附和）","本应该早点买的。（逻辑不符：事实是已经买了）","没必要提前买啊。（逻辑不符：与事实相反）"]},{"num":9,"q":"今の村田監督の映画、僕たちファンの期待を裏切らない出来だったね。","opts":["やっぱり村田監督だよね。","え、どこか気に入らないところあったの?","そんなにがっかりしないでよ。"],"ans":1,"analysis":"問題9（考点：惯用语/意图推断：正面评价） 村田导演的这部新片，真是没辜负我们粉丝的期待。（期待を裏切らない是“不辜负期待”的固定搭配）","opt_notes":["果然是村田导演啊。（得体回应：やっぱり〜だよね是对正面评价的强烈赞同）","诶，你有什么不满意的地方吗？（逻辑不符：与正面评价相反）","别那么失望啊。（逻辑不符：对方在赞扬）"]},{"num":10,"q":"演劇の舞台裏を扱った番組を見たんだけど、製作スタッフあっての舞台なんだと思ったよ。","opts":["確かに、スタッフよりも俳優次第だよね。","裏で支えた人の力が大切なんだね。","スタッフだけじゃ舞台を作れないもんね。"],"ans":2,"analysis":"問題10（考点：语法句型/意图推断：表达感想） 我看了个讲戏剧幕后的节目，觉得一部舞台剧正是因为有制作人员才成立的。（~あっての表示“正因为有前者，才有后者”）","opt_notes":["确实，比起工作人员，还是要看演员。（逻辑不符：与スタッフあっての的意思相反）","在背后支持的人的力量很重要呢。（得体回应：附和了对方的感想）","光有工作人员是做不出舞台剧的嘛。（逻辑不符：话题的重点是工作人员的重要性）"]},{"num":11,"q":"うちの会社、最近経理のソフトウェアを変えたんだけど、使い方がややこしくて先が思いやられるよ。","opts":["それは期待できるね。","そのうち慣れるんじゃない?","え?ソフトウェアは使うのやめちゃったんだ。"],"ans":2,"analysis":"問題11（考点：惯用语/意图推断：抱怨/担忧） 我们公司最近换了财会软件，用法太复杂了，前途堪忧啊。（先が思いやられる是“前途令人担忧”的惯用语）","opt_notes":["那可真让人期待啊。（逻辑不符：与担忧的语气相反）","过段时间就习惯了吧。（得体回应：对对方的抱怨进行安慰）","诶？软件已经不用了吗？（逻辑不符：事实是正在用）"]}]},{"label":"2024年7月","questions":[{"num":1,"q":"今日の授業のレポートそう簡単には書けそうもないよね。","opts":["大変だけどやるしかないよ。","難しいと思ってないの?","ほんと、簡単で助かるよね。"],"ans":1,"analysis":"問題1（考点：语法句型/意图推断：寻求共鸣） 今天课上的报告，看来不那么容易写啊。（そう簡単には〜ない是“没那么容易...”的固定表达，带有寻求共鸣的语气）","opt_notes":["虽然很难，但也只能做了。（得体回应：大変だけどやるしかない附和了对方“不容易”的看法）","你不觉得难吗？（逻辑不符：这是在反问）","真的，很简单帮大忙了。（逻辑不符：与簡単には書けそうもない的意思相反）"]},{"num":2,"q":"僕、この間から和川さんと揉めてて...","opts":["二人で楽しそうだね。","仲直りしたんだ。","なんで?何があったの?"],"ans":3,"analysis":"問題2（考点：意图推断：报告问题） 我从前阵子开始，和和川闹别扭了...（揉めてて表示“发生争执，关系不和”）","opt_notes":["你们俩看起来很高兴啊。（逻辑不符：与揉めてて的意思相反）","你们和好了啊。（逻辑不符：与揉めてて的意思相反）","为什么？发生什么事了？（得体回应：对对方的困境表示关心并询问原因）"]},{"num":3,"q":"さっき見た映画の最後のシーン、私胸を打たれた。","opts":["どうしてワクワクしたの?","僕もあのシーン意味不明なんだよ。","感动的だったよね。"],"ans":3,"analysis":"問題3（考点：惯用语/意图推断：表达感动） 刚才电影的最后一幕，我被深深打动了。（胸を打たれる是“被打动，受感动”的惯用语）","opt_notes":["为什么会兴奋呢？（逻辑不符：ワクワク（兴奋）与胸を打たれる（感动）语感不同）","我也觉得那一幕莫名其妙。（逻辑不符：与正面评价相反）","是啊，很感人呢。（得体回应：感動的だったよね是对胸を打たれた的同意和附和）"]},{"num":4,"q":"お昼の定食屋で飲んだサービスのコーヒー、飲めたもんじゃなかったね。","opts":["もっと飲めばよかったね。","確かにあれは美味しかったね。","ちょっとひどかったよね。"],"ans":3,"analysis":"問題4（考点：语法句型/意图推断：负面评价） 午饭在套餐店喝的免费咖啡，那玩意儿根本不是人喝的。（~たもんじゃない是表示强烈否定的句型，表达了极差的评价）","opt_notes":["要是多喝点就好了。（逻辑不符：对方觉得难喝）","确实，那个很好喝呢。（逻辑不符：与负面评价相反）","是啊，有点过分了。（得体回应：ちょっとひどかったよね是对负面评价的同意）"]},{"num":5,"q":"森さんのことだから、遅刻するはずないのに、来ないね。","o function choose(qIdx,choice){
  if(answers[page][qIdx]&&answers[page][qIdx]!==0)return;
  answers[page][qIdx]=choice;
  const row=document.getElementById('qr-'+qIdx);
  if(!row)return;
  row.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected',i+1===choice);
  });
  updateScore();
}

function applyAnswer(row,q,choice){
  row.classList.add('answered');
  const isCorrect=choice>0&&choice===q.ans;
  row.classList.toggle('correct-ans',isCorrect);
  row.classList.toggle('wrong-ans',!isCorrect||choice<0);
  const badge=row.querySelector('.qstripe-result');
  if(choice>0){
    badge.textContent=isCorrect?'✓ 正解':'✗ 不正解';
  } else {
    badge.textContent='正解 '+q.ans;
    row.classList.remove('correct-ans','wrong-ans');
  }
  row.querySelectorAll('.qopt').forEach((el,i)=>{
    const n=i+1;
    if(n===q.ans) el.classList.add('opt-correct');
    else if(choice>0&&n===choice) el.classList.add('opt-wrong-chosen');
  });
}

function revealAll(){
  DATA[page].questions.forEach((q,i)=>{
    const choice=answers[page][i]||0;
    if(!choice) answers[page][i]=-1;
    const row=document.getElementById('qr-'+i);
    if(row) applyAnswer(row,q,answers[page][i]);
  });
  updateScore();
}

function resetAll(){
  answers[page]=[];
  render();
  document.getElementById('main').scrollTop=0;
}

function updateScore(){
  const qs=DATA[page].questions;
  const selected=answers[page].filter(a=>a&&a>0).length;
  const revealed=answers[page].filter(a=>a!==undefined&&a!==0).length;
  const correct=answers[page].filter((a,i)=>a>0&&a===qs[i].ans).length;
  const s=document.getElementById('score-display');
  if(revealed===0&&selected===0){s.textContent='';return;}
  if(revealed>0&&revealed===qs.length){
    s.textContent=`${correct} / ${selected||0} 正解`;
  } else if(selected>0){
    s.textContent=`${selected}問 選択済`;
  }
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseAnalysis(a){const m=a&&a.match(/^問題\d+[（(]考点[：:](.*?)[）)]\s*/);if(m)return{k:m[1],r:a.slice(m[0].length)};return{k:null,r:a||''};}

function render(){
  const ex=DATA[page];
  document.getElementById('year-badge').textContent=ex.label;
  document.getElementById('page-counter').textContent=(page+1)+' / '+DATA.length;
  document.getElementById('progress-fill').style.width=((page+1)/DATA.length*100).toFixed(1)+'%';

  let h='<div class="fadein">';
  h+=`<div class="exam-head"><div class="exam-title">${esc(ex.label)}</div><div class="exam-sub">JLPT N1 · 聴解 · 問題四 · 即時応答</div><div class="exam-count">${ex.questions.length}問</div></div>`;
  h+='<div class="col-heads"><div class="col-head">選択</div><div class="col-head">正解 · 解析</div></div>';

  for(let qi=0;qi<ex.questions.length;qi++){
    const q=ex.questions[qi];
    const chosen=answers[page][qi]||0;
    const isAnswered=chosen!==0;
    const isCorrect=chosen>0&&chosen===q.ans;
    const {k,r}=parseAnalysis(q.analysis||'');

    let rowClass='qrow';
    if(isAnswered){
      rowClass+=' answered';
      if(chosen>0) rowClass+=isCorrect?' correct-ans':' wrong-ans';
    }

    h+=`<div class="${rowClass}" id="qr-${qi}">`;
    let badgeText=isAnswered?(chosen>0?(isCorrect?'✓ 正解':'✗ 不正解'):'正解 '+q.ans):'';
    h+=`<div class="qstripe"><span class="qstripe-label">問</span><span class="qstripe-num">${q.num}</span><span class="qstripe-result">${esc(badgeText)}</span></div>`;

    h+='<div class="qleft">';
    h+='<div class="qchoice-area">';
    for(let n=1;n<=3;n++){
      const sel=chosen===n?' selected':'';
      h+=`<button class="choice-btn${sel}" onclick="choose(${qi},${n})">${n}</button>`;
    }
    h+='</div>';
    h+='<div class="qcontent">';
    h+=`<div class="qtext">${esc(q.q)}</div><div class="qopts">`;
    for(let i=0;i<q.opts.length;i++){
      const n=i+1;
      let cls='qopt';
      if(isAnswered){
        if(n===q.ans) cls+=' opt-correct';
        else if(chosen>0&&n===chosen) cls+=' opt-wrong-chosen';
      }
      h+=`<div class="${cls}"><span class="qopt-n">${n}</span><span class="qopt-t">${esc(q.opts[i])}</span></div>`;
    }
    h+='</div></div></div>';

    h+='<div class="qright"><div class="qans">';
    h+=`<div class="qans-tag">正解 ${q.ans}</div>`;
    if(r){
      h+=`<div class="qanalysis">${k?`<span class="koten">▸ ${esc(k)}</span>`:''}${esc(r)}</div>`;
    }
    if(q.opt_notes&&q.opt_notes.length){
      h+='<div class="qnotes">';
      for(let i=0;i<q.opt_notes.length;i++){
        const nc=i+1===q.ans;
        h+=`<div class="qnote${nc?' note-ok':''}"><span class="qnote-n">${i+1}</span><span>${esc(q.opt_notes[i])}</span></div>`;
      }
      h+='</div>';
    }
    h+='</div></div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('exam-wrap').innerHTML=h;
  updateScore();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nav(1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();nav(-1);}
});

render();
</script>
</body>
</html>
