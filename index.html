<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N1 聴解 問題四 — 即時応答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8;--cream-dark:#ede5d5;--ink:#1c1610;--ink-soft:#3d3325;
  --ink-muted:rgba(28,22,16,0.5);--vermilion:#c0392b;--vermilion-light:#e8534a;
  --gold:#a07820;--sage:#4a6040;--divider:rgba(28,22,16,0.12);
  --shadow:rgba(28,22,16,0.07);--red-bg:rgba(192,57,43,0.08);
  --red-border:rgba(192,57,43,0.45);--green-bg:rgba(74,96,64,0.09);
  --green-border:rgba(74,96,64,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--cream);color:var(--ink);
  font-family:'Literata','Noto Serif JP',serif;font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:9px 22px;background:var(--ink);border-bottom:2px solid var(--vermilion)}
#header-left{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:0.14em;
  color:rgba(245,240,232,0.45);text-transform:uppercase}
#header-right{display:flex;align-items:center;gap:14px}
#year-badge{font-family:'DM Serif Display',serif;font-size:19px;color:#fff;letter-spacing:0.03em;min-width:90px;text-align:right}
#progress-bar{width:100px;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden}
#progress-fill{height:100%;background:var(--vermilion);border-radius:2px;transition:width .4s ease;width:0%}
#page-counter{font-size:11px;color:rgba(255,255,255,0.32);font-style:italic;min-width:48px;text-align:right}

#controls{flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:7px 22px;background:var(--cream-dark);border-bottom:1px solid var(--divider)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 16px;border:none;
  border-radius:2px;font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:0.05em;
  cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-dark{background:var(--ink);color:var(--cream)}
.btn-dark:hover{background:#2d2518}
.btn-outline{background:transparent;color:var(--ink);border:1px solid var(--divider)}
.btn-outline:hover{background:rgba(28,22,16,0.06)}
.btn-red{background:var(--vermilion);color:#fff}
.btn-red:hover{background:var(--vermilion-light)}
#ctrl-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
#score-display{font-size:12px;color:var(--ink-soft);font-style:italic;min-width:110px;text-align:center;
  font-family:'DM Serif Display',serif;letter-spacing:0.04em}

#main{flex:1;overflow-y:auto;padding:18px 22px 36px;
  scrollbar-width:thin;scrollbar-color:var(--divider) transparent}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
#exam-wrap{max-width:1440px;margin:0 auto}

.exam-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;
  padding-bottom:11px;border-bottom:1px solid var(--divider)}
.exam-title{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:0.03em}
.exam-sub{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);font-style:italic}
.exam-count{margin-left:auto;font-size:11px;color:rgba(28,22,16,0.35);font-style:italic}

.col-heads{display:grid;grid-template-columns:1fr 1fr;margin-bottom:5px;padding:0 2px}
.col-head{font-size:10px;letter-spacing:0.13em;text-transform:uppercase;
  color:rgba(28,22,16,0.28);padding:0 14px}

.qrow{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--divider);
  border-radius:4px;margin-bottom:9px;background:#fff;overflow:hidden;transition:box-shadow .2s}
.qrow:hover{box-shadow:0 2px 10px var(--shadow)}

.qstripe{grid-column:1/-1;display:flex;align-items:center;gap:8px;
  padding:6px 13px;background:var(--ink);color:var(--cream)}
.qstripe-label{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:0.1em;opacity:0.45}
.qstripe-num{font-family:'DM Serif Display',serif;font-size:15px}
.qstripe-result{margin-left:auto;font-size:11px;padding:1px 10px;border-radius:10px;
  letter-spacing:0.06em;opacity:0;transition:opacity .25s;font-family:'DM Serif Display',serif}
.qrow.answered .qstripe-result{opacity:1}
.qrow.correct-ans .qstripe-result{background:#4a6040;color:#fff}
.qrow.wrong-ans .qstripe-result{background:var(--vermilion);color:#fff}

.qleft{padding:13px 14px;border-right:1px solid var(--divider);display:flex;flex-direction:column}

.qchoice-area{display:flex;gap:8px;align-items:center;justify-content:center;padding:16px 0;flex:1}
.choice-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--divider);
  background:#fff;color:var(--ink-soft);font-family:'DM Serif Display',serif;
  font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.choice-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--cream);transform:scale(1.08)}
.choice-btn:active{transform:scale(0.95)}
.choice-btn.selected{border-color:var(--ink);background:var(--ink);color:var(--cream);transform:scale(1.05)}

.qcontent{display:none;flex-direction:column}
.qrow.answered .qchoice-area{display:none}
.qrow.answered .qcontent{display:flex}

.qtext{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14.5px;
  line-height:1.8;font-weight:500;margin-bottom:11px;animation:slidein .25s ease forwards}
.qopts{display:flex;flex-direction:column;gap:5px}
.qopt{display:flex;gap:7px;align-items:flex-start;padding:6px 10px;border-radius:3px;
  border:1.5px solid transparent;font-size:13px;line-height:1.65;
  font-family:'Noto Serif JP',serif;animation:slidein .25s ease forwards}
.qopt-n{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:var(--divider);
  color:var(--ink-soft);font-size:10px;display:flex;align-items:center;justify-content:center;
  margin-top:2px;font-family:'DM Serif Display',serif}
.qopt-t{flex:1}
.qopt.opt-correct{background:var(--green-bg);border-color:var(--green-border)}
.qopt.opt-correct .qopt-n{background:var(--sage);color:#fff}
.qopt.opt-wrong-chosen{background:var(--red-bg);border-color:var(--red-border)}
.qopt.opt-wrong-chosen .qopt-n{background:var(--vermilion);color:#fff}

.qright{padding:13px 14px;background:#fdfaf4}
.qans{opacity:0;transform:translateY(5px);transition:opacity .3s .05s,transform .3s .05s;pointer-events:none}
.qrow.answered .qans{opacity:1;transform:translateY(0);pointer-events:auto}
.qans-tag{display:inline-flex;align-items:center;gap:5px;font-family:'DM Serif Display',serif;
  font-size:11px;letter-spacing:0.12em;color:var(--vermilion);text-transform:uppercase;margin-bottom:7px}
.qans-tag::before{content:'';display:inline-block;width:12px;height:1px;background:var(--vermilion)}
.qanalysis{font-size:12.5px;line-height:1.72;color:var(--ink-soft);margin-bottom:9px}
.koten{font-family:'DM Serif Display',serif;font-style:italic;color:var(--gold);font-size:11px;margin-right:4px}
.qnotes{display:flex;flex-direction:column;gap:4px}
.qnote{display:flex;gap:6px;align-items:flex-start;font-size:12px;line-height:1.65;
  color:var(--ink-muted);padding:4px 8px;border-left:2px solid var(--divider)}
.qnote.note-ok{border-left-color:var(--sage);color:var(--sage);font-weight:500}
.qnote-n{flex-shrink:0;font-family:'DM Serif Display',serif;font-size:10px;
  width:12px;text-align:right;opacity:.5;margin-top:2px}

.fadein{animation:fadein .3s ease forwards}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slidein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.wm{position:fixed;bottom:14px;right:20px;font-family:'DM Serif Display',serif;
  font-size:10px;color:rgba(28,22,16,0.09);letter-spacing:.1em;pointer-events:none;user-select:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">JLPT N1 · 聴解 · 問題四 · 即時応答</div>
    <div id="header-right">
      <div id="year-badge"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="page-counter"></div>
      </div>
    </div>
  </div>
  <div id="controls">
    <button class="btn btn-dark" onclick="nav(-1)">← 前へ</button>
    <div id="ctrl-mid">
      <button class="btn btn-outline" onclick="resetAll()">リセット</button>
      <button class="btn btn-red" onclick="revealAll()">全問表示</button>
      <div id="score-display"></div>
    </div>
    <button class="btn btn-dark" onclick="nav(1)">次へ →</button>
  </div>
  <div id="main"><div id="exam-wrap"></div></div>
</div>
<div class="wm">N1 聴解 即時応答</div>
<script>
const DATA=[{"label":"2010年7月","questions":[{"num":1,"q":"ご都合のよろしい日をご指示いただけますか。","opts":["ええ、そういうことで結構です。","その日はちょっと都合が悪いんですが。","じゃ、来週の木曜日にしましょうか。"],"ans":3,"analysis":"（考点：请求与许可/委婉表达） 您能指定一个您方便的日期吗？（~ていただけますか是请求对方为自己做某事的敬语表达）","opt_notes":["好的，就那样可以。（不适用：結構です用于对对方的“提议”表示接受或拒绝，但问句是“请求具体信息”）","那天我有点不方便。（逻辑不符：その日指代特定日期，但问句中并未提出任何具体日期）","那么，定在下周四怎么样？（得体回应：〜ましょうか是主动提出具体方案以回应对方请求的顺畅表达方式）"]},{"num":2,"q":"すみません、営業の山田さんにお会いしたいんですが。","opts":["さっそく、お願いたします。","ご案内いただけますか。","今、呼んでまいります。"],"ans":3,"analysis":"（考点：请求与许可/敬语应用/陷阱：角色混淆） 不好意思，我想拜访一下营业部的山田先生。（~んですが是通过省略句尾来委婉提出请求的口语形式）","opt_notes":["那就马上拜托您了。（角色混淆：お願いいたします是访客/请求方该说的话）","能为我带路吗？（角色混淆：~ていただけますか是请求对方为自己做事，是访客的提问而非接待人员的回答）","我现在就去叫他过来。（得体回应：呼んでまいります是呼んでくる的谦让语，是接待人员对访客的标准规范用语）"]},{"num":3,"q":"今日はお忙しいところおいでいただき、ありがとうございました。","opts":["お会いできてよかったです。","今回はお伺いできなくてすみません。","どうぞ、またおいでください。"],"ans":1,"analysis":"（考点：敬语应用/意图推断：感谢/陷阱：角色混淆） 今天您在百忙之中光临，非常感谢。（おいでいただき是来てもらう的尊敬语，是主人对客人的标准感谢语）","opt_notes":["能见到您我非常高兴。（得体回应：お会いできて是动词会う的自谦语お会いする的可能态，是客人回应主人感谢的常用标准寒暄语）","这次没能拜访您，非常抱歉。（场景不符：お伺いできなくて用于未能赴约或缺席时的道歉）","请您下次再来。（角色混淆：またおいでください是主人送客时说的话，客人不能对自己说）"]},{"num":4,"q":"あのう、この計画、このままだとうまくいかないじゃないんでしょうか。","opts":["いや、問題ないと思いますけどね。","本当にうまくいきましたね。","よし、さっそくいきましょう。"],"ans":1,"analysis":"（考点：意图推断：征求意见/语法句型） 那个，这个计划照这样下去，怕是行不通吧？（~じゃないんでしょうか是用否定疑问的形式，委婉地提出自己的负面看法，并寻求对方确认）","opt_notes":["不，我觉得没问题啊。（得体回应：~と思いますけどね是在表达自己不同看法时，缓和语气的常用句末表达）","真的进行得很顺利呢。（时态不符：~ました是过去时，而问句是关于未来的担忧）","好，那我们马上开始吧。（答非所问：未回应うまくいかない这一核心担忧）"]},{"num":5,"q":"ほら、見て、あの人のプレー、先発チームのメンバーだけのことがあるよね。","opts":["うん、さすがちょっと違うよね。","えっ?メンバーだけじゃないよ。","そう? 結構上手だと思うけど。"],"ans":1,"analysis":"（考点：语法句型/意图推断：赞赏） 快看，那个人的球技，真不愧是首发队员啊。（~だけのことはある是基于已知事实做出理所当然的正面评价的句型）","opt_notes":["嗯，果然非同一般啊。（得体回应：副词さすが专门用于对预料之中的优秀表现表示赞赏，与句型的评价功能高度吻合）","诶？不止是队员啊。（句型理解错误：将だけ从固定句型中生硬剥离，进行了字面意思的误读）","是吗？我觉得打得挺好的呀。（逻辑不符：~と思うけど通常用于对负面批评的温和反驳，但问句本身就是极高的赞扬）"]},{"num":6,"q":"この件ですが、山田部長にもお伝えいただけるとありがたいんですが。","opts":["よろしく伝えてください。","お伝えいただけると助かります。","では、あとで伝えておきます。"],"ans":3,"analysis":"（考点：请求与许可/授受关系） 关于这件事，如果能代我转告给山田部长，我将不胜感激。（~ていただけるとありがたいんですが是非常礼貌地请求对方为自己做某事）","opt_notes":["请代我问好。（角色混淆：よろしく伝えてください是拜托听话人向第三方传话，不能作为对他人请求的应答）","如果您能转告的话就帮大忙了。（逻辑不符：这是在复述和重复请求，而不是在正面回应请求）","好的，我稍后会转告他。（得体回应：~ておきます表示接受了对方的代为转告请求，并为将来做好准备动作）"]},{"num":7,"q":"この値段、あと少し何とかなませんか。","opts":["そういうわけじゃないんですよ。","えっ?何か間違いがありましたか?","うーん、これ以上は難しいですね。"],"ans":3,"analysis":"（考点：意图推断：请求交涉/惯用语） 这个价格，能不能再便宜（通融）一点？（何とかなりませんか是职场或商务交涉中寻求“想办法通融、让步”的经典惯用语）","opt_notes":["并不是那么回事。（答非所问：そういうわけじゃない用于否定对方的某个猜测）","诶？是有什么错吗？（理解错误：误以为对方在指出账目或价格在物理上算错了）","嗯......再低就困难了。（得体回应：これ以上は難しい是拒绝对方还价、降价交涉请求时的标准职场委婉说法）"]},{"num":8,"q":"いまさら急いだところで、だめなんじゃない。","opts":["えっ、どこにいってきたの。","いや、とてもいいらしいね。","だめってことないよ。"],"ans":3,"analysis":"（考点：语法句型/意图推断：消极看法反驳） 事到如今再怎么赶，恐怕也无济于事（来不及）了吧。（~たところで表示“即使……也（没用）”，表达了消极、徒劳的预判语气）","opt_notes":["诶？你去哪儿了？（答非所问）","不，听说好像很不错呢。（跑题偏离）","也不一定就不行啊。（得体回应：だめってことないよ是だめということはない的口语化形式，直接反驳了同伴消极、放弃的看法）"]},{"num":9,"q":"田中さんの気配りには、本当に頭が下がりますね。","opts":["それは大変なことになりましたね。","本当に、私も見習いたいと思います。","早く謝ったほうがいいですよ。"],"ans":2,"analysis":"（考点：惯用语/意图推断：赞赏钦佩） 田中女士的细心周到，真是令人佩服（甘拜下风）啊。（頭が下がる是表达“由衷钦佩、佩服”的经典正面惯用语）","opt_notes":["那可真是不得了（出大事）了。（惯用语理解错误：将頭が下がる负面误解成了身体不舒服或发生了灾祸）","是啊，我也非常想向她学习。（得体回应：見習う（学习、效仿）是对钦佩对象表达尊敬和极度赞同的具体延伸行为）","还是快点去道歉比较好。（因错误理解惯用语的褒贬内涵而做出的荒谬回答）"]},{"num":10,"q":"部長、この企画、今度こそ通したいと思っています。","opts":["期待していますよ。","ついにやり遂げましたね。","適切なアドバイス、ありがとうございました。"],"ans":1,"analysis":"（考点：意图推断：下属表达决心） 部长，这个企划，这次我一定要让它通过。（~たいと思います在此向领导表达了强烈的执行决心和工作意志）","opt_notes":["我很期待你的表现哦。（得体回应：期待していますよ是上级对下属表达决心时，最标准、最到位的鼓励与期许用语）","终于彻底完成了呢。（时态不符：やり遂げましたね是过去时，表示事情已经成功完工）","谢谢你恰当的建议。（角色混淆：这是当下属向前辈道谢时的话，不能作为部长的回复）"]},{"num":11,"q":"あのパソコン、捨てるくらいなら、俺が使いたかったのに。","opts":["じゃあ、使い方、教えてあげるね。","でも、古くて使いにくかったんだよ。","捨てるなら、あしたにしたら?"],"ans":2,"analysis":"（考点：语法句型/意图推断：遗憾与抱怨回应） 那个电脑，与其扔掉，还不如给我用呢。（~くらいなら表示“与其……不如……”，后接~のに表达了“早知道你要扔，就该给我”的强烈遗憾与小抱怨）","opt_notes":["那我来教你怎么用吧。（逻辑不符：误以为对方已经拿到了那台电脑）","但是，那台电脑其实又旧又不好用啊。（得体回应：直接陈述客观事实理由，是对同伴的遗憾和抱怨给予合理宽慰与合理解释的自然表达）","要是扔的话，明天再扔怎么样？（逻辑不符：未听懂对方流露出的惋惜和想要电脑的真实意图）"]}]},{"label":"2010年12月","questions":[{"num":1,"q":"あの、何か書くものを拝借 "analysis":"（考点：惯用语/意图推断：抱怨） 又是机器故障又是别的，今天真是倒霉透了。（さんざんだった是“糟糕透顶”的口语表达）","opt_notes":["诶，真够呛啊。（得体回应：大変だったね是对听到的负面经历表示同情和慰问的标准句式）","不是挺顺利的吗？（逻辑不符：与さんざんだった的意思完全相反）","要是每天都这样就好了。（逻辑不符/讽刺：通常不会如此回应抱怨）"]}]},{"label":"2011年7月","questions":[{"num":1,"q":"今日は忙しいところを手伝わせちゃって悪かったね。","opts":["えっ、忙しくなるんですか?","そんなはずはないと思います。","いいえ、いつでもおっしゃってください。"],"ans":3,"analysis":"（考点：授受关系/意图推断：感谢） 今天让你在百忙之中来帮忙，真不好意思。(~させちゃって悪かったね是对自己让对方做了某事而表示歉意和感谢)","opt_notes":["诶？会变忙吗？(时态不符：事情已结束)","我觉得不可能。(答非所问)","哪里哪里，随时都可以叫我。(得体回应：いつでもおっしゃってください是对对方的感谢表示不用在意的标准回答)"]},{"num":2,"q":"明日の映画なんだけど、レポートやら、実習やらでそれどころじゃなくなっちゃったんだ。","opts":["きっと面白いよね。","えー、いけないの?残念。","忙しいのに、よく行ったね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：拒绝） 关于明天的电影，又要写报告又要实习，根本没那工夫了。(~やら〜やらで列举原因、それどころじゃない表示“不是做...的时候”，暗示因太忙而无法赴约)","opt_notes":["一定很有趣吧。(答非所问)","诶？去不了了？真遗憾。(得体回应：准确理解了それどころじゃない的言外之意)","那么忙还去了啊，真厉害。(场景不符：对方并没去)"]},{"num":3,"q":"あのう、こちらの傘、お忘れじゃないですか。","opts":["どうぞ、お気をつけください。","あっ、どうも恐れ入ります。","お持ちしましょうか。"],"ans":2,"analysis":"（考点：敬语应用/意图推断：提醒） 那个，这把伞，您是不是忘了？（お忘れじゃないですか是提醒对方可能遗忘了物品）","opt_notes":["请您小心。(答非所问：お気をつけください是送别时的话)","啊，真是非常感谢。(得体回应：恐れ入ります在此表示非常感谢对方的提醒)","我来帮您拿吧？（角色混淆：お持ちしましょうか是提供帮助时的话）"]},{"num":4,"q":"悪いね。預かった資料、まだ見てないんだよ。ずっと電話が鳴りっぱなしで...","opts":["はい、すぐにお電話させますので。","ただいま席をはずしております。","では、お時間のあるときにお願いします。"],"ans":3,"analysis":"（考点：意图推断：道歉） 不好意思啊，你给我的资料我还没看。电话一直响个不停...（前半句道歉，后半句解释原因）","opt_notes":["好的，我马上让他给您回电话。(逻辑不符：与“电话响个不停”的语境不符)","他现在正好不在座位上。(逻辑不符)","那么，请您有时间的时候再看吧。(得体回应：对对方的处境表示理解，并体谅对方)"]},{"num":5,"q":"今日の先生の講義、ちんぷんかんぷんだったよ。","opts":["丁寧で分かりやすかったね。","難しくて、私も全然。","ああいう話って、わくわくするよね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：寻求共鸣） 今天老师的课，我完全听不懂。(ちんぷんかんぷん是“完全搞不懂”的惯用语)","opt_notes":["讲得又仔细又好懂呢。(逻辑不符：与对方的感受完全相反)","是啊，太难了，我也完全不懂。(得体回应：私も全然表示自己有同感，附和对方)","那种话题真让人兴奋啊。(逻辑不符：与对方的感受完全相反)"]},{"num":6,"q":"ああ、あんな負け方するくらいなら、はじめからやるんじゃなかった。","opts":["途中からでもやってみたら?","やってみればよかったね。","よく頑張ったと思うよ。"],"ans":3,"analysis":"（考点：语法句型/意图推断：后悔） 唉，与其输成那样，还不如一开始就不参加呢。(~くらいなら、〜ほうがいい的变形, 表达强烈的后悔)","opt_notes":["从中途开始试试怎么样?(答非所问)","要是当初参加了就好了。(逻辑不符：对方参加了并且后悔了)"," ["じゃ、そうしてみましょうか。","ああ、それは楽しみですね。","えっ、仕事でも入ったんですか?"],"ans":3,"analysis":"（考点：意图推断：愿望落空） 这次的假期，本以为能和家人好好过呢......(~と思ってたのにな表达了期待落空的遗憾和失望)","opt_notes":["那就这么办吧。(逻辑不符：对方的愿望已经落空)","啊，那真让人期待啊。(逻辑不符：对方的愿望已经落空)","诶？是有工作了吗？(得体回应：仕事でも入ったんですか推测对方愿望落空的原因)"]},{"num":14,"q":"出張の件だったら部長に聞くまでもないよ。","opts":["じゃ、聞かないとだめですね。","でも、念のため聞いてみます。","やっぱり聞いたほうがいいですか。"],"ans":2,"analysis":"（考型：语法句型） 关于出差的事，用不着去问部长。(~までもない表示“没必要做某事”) 2011年7月的 14 道完整题目已全部无损提取完毕。 请您在下方回复“继续”，我将为您无缝开始提取【2011年12月】完整的 13 道真题！","opt_notes":["那就是不问不行咯。(理解相反：误解为必须去问)","不过，为了以防万一我还是问问看。(得体回应：念のため（为了慎重起见）表达了虽然对方说没必要，但自己出于谨慎还是决定去问的常见对话模式)","果然还是问一下比较好吧？(逻辑不符)"]}]},{"label":"2011年12月","questions":[{"num":1,"q":"あのう、恐れ入りますが、こちらへの駐車はご遠慮いただいております。","opts":["ご遠慮なさらず、どうぞ。","あっ、気が付かなくて。","じゃ、せめて車だけでも。"],"ans":2,"analysis":"（考点：敬语应用/意图推断：提醒） 那个，不好意思，这里禁止停车。(ご遠慮いただいております是“请勿...”的礼貌的用语)","opt_notes":["请别客气，随便停。（角色混淆：这是允许停车的人说的话）","啊，我没注意到。（得体回应：気が付かなくて是对自己违规行为的道歉）","那，至少让我把车...（逻辑不符：不合情理的请求）"]},{"num":2,"q":"アルバイトさえなければ、昨日のコンサート行ったんだけどなあ。","opts":["ああ、アルバイトなくなったんだ。","コンサート盛り上がった?","アルバイト、なんとかならなかったの?"],"ans":3,"analysis":"（考点：语法句型/意图推断：遗憾） 要不是有打工，昨天的演唱会我就去了。(~さえなければ、~のに与事实相反的遗憾)","opt_notes":["啊，打工取消了啊。（理解相反：对方正因为有打工才没去成）","演唱会气氛很热烈吗？（逻辑不符：对方没去成，不知道现场情况）","打工那事就不能想想办法吗？（得体回应：なんとかならなかったの对对方的遗憾表示理解，并询问是否当时有变通的可能）"]},{"num":3,"q":"この書類、昨日までに先方にお届けするように言ったはずでしょう。","opts":["そのように先方に伝えておきます。","申し訳ありません。至急送ります。","どうやらそうらしいです。"],"ans":2,"analysis":"（考点：意图推断：批评/责备） 这份文件，我应该说过让你昨天之前送到客户那里的吧！(~はずでしょう表达了“本应如此”的强烈语气，是在责备对方)","opt_notes":["我会这样转告客户的。（答非所问）","非常抱歉，我立刻就寄过去。（得体回应：作为被责备的一方，立刻道歉并提出补救措施）","好像是那样的。（态度不当：どうやらそうらしいです语气过于随意，不适合回应上级的责备）"]},{"num":4,"q":"もし保険の加入をお考えでしたら、ご自宅に案内を送らせて頂きたいのですが。","opts":["わざわざ来ていただいては恐縮ですから。","いいえ、特に関心がありませんので。","え?家まで案内してくださらなくでも。"],"ans":2,"analysis":"（考点：敬语应用/意图推断：推销） 如果您考虑加入保险，我们想把介绍资料寄到您府上。(~させていただきたいのですが是请求对方允许自己做某事的自谦语，是推销的常用语)","opt_notes":["让您特意过来一趟，太不好意思了。（逻辑不符：对方是说要“寄”资料，不是“来”）","不了，我没什么兴趣。（得体回应：特に関心がありませんので直接而礼貌地拒绝对方的推销）","诶？不用带我到家里去的。（理解错误：将案内误解为“带路”）"]},{"num":5,"q":"ああ、やってらんないよなあ。今週でプロジェクト打ち切りだなんて。","opts":["後すこしで結果出せたのにね。","評価が高かっただけのことはあるよね。","やれば出来るってことだね。"],"ans":1,"analysis":"（考点：惯用语/意图推断：抱怨） 唉，真没法干了啊。这个项目这周就要被砍掉了。(やってらんない是やっていられない的口语形式，表示“干不下去了”，是强烈的抱怨)","opt_notes":["是啊，明明差一点就能出结果了。（得体回应：後すこしで〜のに附和对方的抱怨，表达同样的惋惜之情）","真不愧是评价很高啊。（逻辑不符：与“被砍掉”的负面结果矛盾）","这就说明只要做还是能做到的嘛。（逻辑不符）"]},{"num":6,"q":"この料理、二人分にしちゃ物足りないよね。","opts":["うん、食べた気がしないね。","ひとり分で十分だったよね。","本当、食べきれないよ。"],"ans":1,"analysis":"（考点：意图推断：寻求共鸣） 这道菜，作为两人份来说有点不够吃啊。(物足りない意思是“感觉差点, 不够满足”，寻求对方的同感)","opt_notes":["嗯，感觉跟没吃一样。（得体回应：食べた気がしない形象地表达了物足りない的感觉，表示完全同意）","一人份就足够了呢。（逻辑不符：与“不够吃”的意思相反）","真的，完全吃不完啊。（逻辑不符：与“不够吃”的意思相反)"]},{"num":7,"q":"君がしたことは社会人としてあるまじき行為ですよ。","opts":["責任を痛感しております。","確かに承りました。","認めていただいてありがとうございます"],"ans":1,"analysis":"（考点：语法句型/意图推断：批评） 你做的事，作为社会人是不应有的行为！（~としてあるまじき行為是非常严厉的批评，まじき是古语助动词まじ的连体形，表示“不应, 不该”）","opt_notes":["我深刻地感受到了自己的责任。（得体回应：責任を痛感しております）","我确实收到了。（答非所问：承る是“接受命令/要求”的自谦语）","感谢您的认可。（逻辑不符：对方在批评而非认可）"]},{"num":8,"q":"部長にしてみれば、今月の内の部の営業成績は今ひとつなのかなあ。","opts":["これも部長のおか功だね。","納得してない感じだったね。","確かに満足気だったね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：推测） 在部长看来，我们部这个月的营业成绩或许是不太理想吧。(~にしてみれば表示“站在...的立场上来看”，今ひとつ表示“差一点, 不理想”)","opt_notes":["这也多亏了部长啊。（逻辑不符：业绩不理想，不能感谢部长）","是啊，他看起来不太满意的样子。（得体回应：納得してない感じだった）","确实，他看起来很满足的样子。（逻辑不符：与今ひとつ的推测相反）"]},{"num":9,"q":"この分なら、今日残影しなくて済みそうだね。","opts":["思ったよりスムーズに進んだもんね。","残業、早めに済んでよかったね。","本当に嫌になっちゃうよね。"],"ans":1,"analysis":"（考点：语法句型） 照这个进度，今天看来不用加班就能搞定了。(~なくて済みそうだ表示“看来可以免于做某事了”)","opt_notes":["是啊，比预想的进展顺利多了。（得体回应：思ったよりスムーズに進んだもんね解释为什么能“不用加班就搞定”）","加班能早点结束太好了。（逻辑不符：对话的前提是“不用加班”）","真是烦死了。（逻辑不符：事情进展顺利，不应感到烦躁）"]},{"num":10,"q":"では、そろそろ新年会もこの辺でお開きにしましょうか。","opts":["ああ、この場所がいいですね。","そうですね。もう遅いですし。","皆さんおそろいなので、まず乾杯しましょう。"],"ans":2,"analysis":"（考点：惯用语/意图推断：提议） 那么，新年会差不多就在这里结束吧？(お開きにする是宴会等“结束, 散会”的固定说法)","opt_notes":["啊，这个地方不错呢。（陷阱：この辺で指“差不多到此为止”，而非“这个地方”）","是啊，时间也不早了。（得体回应：もう遅いですし同意结束的提议，并说出理由）","大家都到齐了，先干杯吧。（逻辑不符：这是宴会刚开始时说的话）"]},{"num":11,"q":"味もさることながら、店の雰囲気作りにも気を遣いました。","opts":["じゃ、美味しさは二の次ですね。","ひたすら味を追求したわけですね。","本当に素敵なインテリアですね。"],"ans":3,"analysis":"（考点：语法句型） 这家店不仅是味道, 在营造店铺氛围上也很用心。(AもさることながらBも表示“A自不待言, B也...”）","opt_notes":["那就是说美味是次要的咯。（曲解：さることながら是强调B, 但并非否定A）","也就是说只是一味地追求味道咯。（理解相反）","内部装潢真的很棒呢。（得体回应：针对B(氛围)的部分进行称赞，表示听懂了对方的言下之意）"]},{"num":12,"q":"あのう、予算案提出の締切すこし延ばしてもらえないものかと。","opts":["お急ぎになるお気持ちは理解できますが。","では、日にちを繰り上げるということで。","この日を過ぎると、難しいものですから。"],"ans":3,"analysis":"（考点：语法句型/意图推断：请求） 那个，预算案的提交截止日期, 不知能否稍微延长一些？(~てもらえないものかと是~てもらえませんか的更迂回、更礼貌的请求方式)","opt_notes":["我理解您着急的心情, 但是...（角色混淆：这是拒绝请求的一方说的话）","那么, 就决定把日期提前吧。（理解相反：对方请求的是“延长”）","因为过了这个日期就不好办了。（得体回应：作为被请求方, 〜ものですから委婉地说明无法延期的理由）"]},{"num":13,"q":"コーヒー、どうぞ。せっかく来ていただいたのに、何もなくて。","opts":["いえいえ、急におじゃましてしまって。","どうぞ、ゆっくりしててください。","では、また日を改めて。"],"ans":1,"analysis":"（考点：敬语应用/意图推断：客套） 请用咖啡。您特意过来, 却没什么好招待的。(せっかく〜のに在此是主人招待客人时的客套话, 表达歉意) 2011年12月的 13 道完整题目已全部无损提取完毕。 请您在下方回复“继续”，我将为您无缝开启【2012年7月】真题的全量精准提取！","opt_notes":["哪里哪里, 是我突然前来打扰了。（得体回应：急におじゃましてしまって作为客人, 回应主人的客气, 同样用客套话回复）","请您慢慢坐。（角色混淆：这是主人对客人说的话）","那么, 我改天再来吧。（逻辑不符：对话正在进行中）"]}]},{"label":"2012年7月","questions":[{"num":1,"q":"すみません、あの方のお名前は?","opts":["さあ、存じ上げません","いいえ、お見かけしませんが","はい、かしこまりました。"],"ans":1,"analysis":"（考点：敬语应用） 不好意思, 那位叫什么名字?","opt_notes":["我不认识。（得体回应：存じ上げません是知りません的谦让语, 是表示不认识某人时的标准敬语）","不, 我没见到他。（答非所问：お見かけしません 回答的是是否“见到”）","好的, 我明白了。（答非所问：かしこまりました用于接受指示或请求）"]},{"num":2,"q":"うーん。この企画、やっぱり諦めるしかないよね。","opts":["残念だけど、仕方ないよね。","やっとうまくいきそうだね。","途中でやめなくてよかったね。"],"ans":1,"analysis":"（考点：语法句型/意图推断：寻求共鸣） 恩, 这个企划, 看来还是只能放弃了啊。(~しかない表示“别无选择”, 带有无奈语气)","opt_notes":["虽然很遗憾, 但也没办法了啊。（得体回应：仕方ないよね表示理解并同意对方的无奈决定）","总算好像要顺利进行了呢。（逻辑不符：与放弃的意思相反）","中途没放弃真是太好了。（逻辑不符：与放弃的意思相反）"]},{"num":3,"q":"林さん、今日のプレゼン、林さんの助言がなければうまくいかなかったよ。","opts":["すみません、次は頑張ります。","あ、いえ、お役にたててよかったです。","え、助言を聞いてくれなかったんですね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：感谢） 林先生, 今天的发表, 要是没有您的建议, 是不会成功的。(~なければ、〜なかった是表达感谢的经典句型, 意为“如果没有...就不会有...”)","opt_notes":["对不起, 下次我会努力的。（逻辑不符：对方在感谢而非批评）","啊, 哪里, 能帮上忙就太好了。（得体回应：お役にたててよかったです回应感谢）","诶, 你没听我的建议啊。（逻辑不符：与事实相反）"]},{"num":4,"q":"ねえ、これ間違ってるんじゃないかな。","opts":["そうね。私も合ってると思う。","そうかな。私はいいと思うけど。","いや、間違ってるね。"],"ans":2,"analysis":"（考点：意图推断：提出异议） 喂, 这个是不是搞错了? (~じゃないかな是用否定疑问的形式委婉地提出自己的怀疑)","opt_notes":["是啊, 我也觉得是对的。（逻辑不符：回答自相矛盾）","是吗? 我觉得挺好的呀。（得体回应：そうかな表示对对方的怀疑持保留意见, 并用~と思うけど温和地表达自己的看法）","不, 是错了。（逻辑不符：这是肯定对方的怀疑, 但语气过于直接, 不如2自然）"]},{"num":5,"q":"送別のお店なんですが、どこかいいところありませんか。","opts":["料理がおいしいと評判のお店ですよ。","皆参加できるといいですね","うーん、田中さんが詳しいと思いますよ。"],"ans":3,"analysis":"（考点：意图推断：请求建议） 关于送别会的店家, 有什么好地方推荐吗?(どこかいいところありませんか是请求对方推荐)","opt_notes":["是家饭菜好吃、有口皆碑的店哦。（逻辑不符：这是在描述一家店, 而非推荐）","要是大家都能参加就好了呢。（答非所问：跑题到对参加情况的期望）","嗯......我觉得田中应该比较清楚。（得体回应：虽然自己不知道, 但向提问者提供了可能知道的人选, 是间接的帮助）"]},{"num":6,"q":"マラソン大会に出るからには優勝してみせるよ。","opts":["じゃ、出ないんだね。","出るわけじゃないからね。","せっかく出るんだもんね。"],"ans":3,"analysis":"（考点：语法句型/意图推断：表达决心） 既然要参加马拉松大赛, 我就一定要拿个冠军回来! (~からには表示“既然...就一定...”, 〜てみせる表达决心)","opt_notes":["那就是说不参加咯。（理解相反）","因为又不是非参加不可。（逻辑不符）","是啊, 毕竟难得参加一次嘛。（得体回应：せっかく~んだもんね对对方的决心表示理解和鼓励）"]},{"num":7,"q":"講演会なんだけど、資料は多めに用意しとくに越したことはないよね。","opts":["なるほど、出席者少ないですし。","じゃ、たくさんコビーしておきます。","資料は余ったら無駄ですもんね。"],"ans":2,"analysis":"（考型：语法句型） 关于演讲会, 資料多准备一些总没错。(~に越したことはない是“没有比...更好的了”)","opt_notes":["原来如此, 因为出席的人少。（逻辑不符：人少就不需要多准备了）","好的, 那我就多复印一些。（得体回应：理解并接受了对方的建议）","资料要是多余了就浪费了嘛。（逻辑不符：与对方的建议完全相反）"]},{"num":8,"q":"この書類、今日中に仕上げてもらえると助かるんだけど。","opts":["それはいけませんね。","まったくおっしゃる通りです。","何とかいけると思います。"],"ans":3,"analysis":"（考点：授受关系/意图推断：请求） 这份文件, 如果今天之内能帮我完成就太好了。(~てもらえると助かるんだけど是请求对方帮忙的委婉说法)","opt_notes":["那可不行啊。（不适用：いけませんね通常用于指责或禁止某行为）","您说的太对了。（答非所问：おっしゃる通りです用于完全同意对方的某个观点）","我想应该能想办法搞定。（得体回应：何とかいけると思います是对自己能否完成请求的不确定但积极的回应）"]},{"num":9,"q":"どんなに忙しかろうが、報告は怠るもんじゃないよ。","opts":["忙しい時は必要ないですね。","今後十分に気を付けます。","そんなにお忙しいんですか?"],"ans":2,"analysis":"（考点：语法句型/意图推断：告诫） 无论多忙, 报告都不该懈怠!(~うが、〜まいが的变形, 表示“无论...”, 〜もんじゃない表示“不应该做某事”, 是告诫的语气)","opt_notes":["忙的时候就没必要了啊。（逻辑不符：与告诫的内容完全相反）","我今后会十分注意的。（得体回应：接受对方的告诫, 并表示会改正)","您那么忙吗？（答非所问：误将告诫当成对方在抱怨自己忙）"]},{"num":10,"q":"もういい加減にしてよ。こんなに待たせて。","opts":["次は遅れないようにするから。","それがちょうどいいね。","どれぐらい待ったと思う?"],"ans":1,"analysis":"（考点：惯用语/意图推断：抱怨/生气） 你适可而止吧! 让我等这么久! (いい加減にしてよ是表达“够了, 别再这样了”的强烈不满)","opt_notes":["下次我努力不迟到。（得体回应：作为被抱怨的一方, 进行道歉并承诺改正）","那样正好。（ っていうんじゃ仕方ないね。","絶対に受けないってどうして?"],"ans":1,"analysis":"（考点：语法句型） 听说下周的体检, 并不是非去不可。(~ってわけじゃない是部分否定, 表示“并非一定...”)","opt_notes":["那就是说不去也行咯?（得体回应：对~ってわけじゃない的含义进行确认）","既然说全员都去那就没办法了。（逻辑不符：与“并非非去不可”的前提矛盾）","为什么坚决不去呢?（逻辑不符：问句并未表达“坚决不去”）"]},{"num":11,"q":"山川食品との交渉なんとか契約にこぎつけたよ。","opts":["苦労が報われたね。","そんなふうにあきらめないでよ。","つぎこそは契約がとれるといいね。"],"ans":1,"analysis":"（考点：惯用语/意图推断：报告成功） 和山川食品的谈判, 总算是达成协议了。(契約にこぎつける是”(历经困难)终于达成协议”的惯用语)","opt_notes":["辛苦总算有回报了啊。（得体回应：苦労が報われた对对方的成功表示祝贺和慰劳）","不要那样放弃啊。（逻辑不符：事情已经成功）","下次一定能签下合同的。（逻辑不符：事情已经成功）"]},{"num":12,"q":"この辺、コンビニの一軒ぐらいあってもよさそうなものなのにねえ。","opts":["たしかに、こんなとこお客さんめったに来ないよね。","人通りも多いのに、どうしてないのかな。","一軒だけだからこんなに込んでるんだ。"],"ans":2,"analysis":"（考点：语法句型/意图推断：寻求共鸣） 这附近, 感觉有个便利店之类的也挺好啊。(~てもよさそうなものなのに表示“按理说有...也挺好, 但实际上没有”, 表达一种不满或遗憾)","opt_notes":["确实, 这种地方客人很少来。（逻辑不符：如果客人少, 就不需要便利店了）","是啊, 人流量也挺大的, 怎么会没有呢。（得体回应：附和对方的观点, 并进一步提出理性佐证）","因为只有一家, 所以才这么挤。（逻辑不符：对话的前提是“没有”便利店）"]},{"num":13,"q":"木村さん、このあいだ大阪に転勤したと思ったら、今度は北海道だって。","opts":["そろそろ大阪じゃないかと思ったんだ。","へえ、大阪に転勤するんじゃなかったんだ。","大阪、まだ一年にもなってないのにね。"],"ans":3,"analysis":"（考点：意图推断） 木村啊, 刚觉得他前阵子调到大阪去了, 这次又听说要去北海道了。","opt_notes":["我就觉得差不多该去大阪了。（逻辑不符：对方已经去过大阪）","哦, 原来他不是要调去大阪啊。（逻辑不符：对方已经去过大阪）","是啊, 在大阪还没待满一年呢。（得体回应：对对方频繁调动的事实表示惊讶和感慨）"]},{"num":14,"q":"店長、今日は雨が降ってるせいか、朝からお客さんがひっきりなしですね。","opts":["やっぱり天気が悪いと、お客さん来ないね。","雨の日はいつも込むからね。","それほど空いてるわけじゃないよ。"],"ans":2,"analysis":"（考点：惯用语/意图推断） 店长, 今天可能是因为下雨吧, 从早上开始客人就络绎不绝。(ひっきりなし是“接连不断, 络绎不绝”的副词) 2012年12月的 14 道完整题目已严格核对、一题不漏地为您全量码完。 请您在下方回复“继续”，我将为您无缝开启【2013年7月】真题的全量高精度提取！","opt_notes":["果然天气不好客人就不来啊。（逻辑不符：与ひっきりなし的意思相反）","是啊, 下雨天总是很忙。（得体回应：对“下雨天人多”的现象表示同意）","也不是那么空闲。（逻辑不符：与ひっきりなし的意思相反）"]}]},{"label":"2013年7月","questions":[{"num":1,"q":"ねえ、会計課の山田君、いつもぼそぼそ話すよね。","opts":["もう少しはっきり話してほしいよね。","もっと静かに話せないのかな。","本当に聞きやすくていいよね。"],"ans":1,"analysis":"（考点：拟声拟态词/意图推断：抱怨） 喂，会计课的山田，说话总是小声嘀咕的。(ぼそぼそ話す是形容小声、含糊不清地说话)","opt_notes":["是啊，真希望他能说得再清楚一点。(得体回应：附和对方的抱怨，并说出自己的期望)","他不能再安静点说话吗？(逻辑不符：与ぼそぼそ的意思相反)","真的很好懂，很不错呢。(逻辑不符：与ぼそぼそ的负面语感相反)"]},{"num":2,"q":"昨日の夜中のサッカー中継、うっかりしてて見逃しちゃったよ。","opts":["よく夜中まで見てたわね。","へえ、録画しとかなかったの。","ボールから目を離しちゃだめだよ。"],"ans":2,"analysis":"（考点：意图推断：遗憾） 昨天半夜的足球转播，一不留神错过了。(うっかりしてて表示“不留神”，見逃す表示“错过”)","opt_notes":["你还真能看到半夜啊。(逻辑不符：对方没看成)","哦，你没录下来吗？(得体回应：对对方的遗憾表示理解，并提出一个本可以避免遗憾的方案)","可不能把视线从球上移开啊。(答非所问：这是在评论看球时的态度)"]},{"num":3,"q":"今日の面接、散々だったよ。","opts":["しっかり準備しただけのこと、あったね。","なんか失敗でもしたの。","ありがたい話だね、今日はついてたね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：抱怨） 今天的面试，真是糟透了。(散々だった是“糟糕透顶”的口语表达)","opt_notes":["真不愧是准备得很充分啊。(逻辑不符：与散々だった的意思相反)","怎么，出什么岔子了吗？(得体回应：对对方的抱怨表示关心并询问具体原因)","那可真是求之不得，今天真幸运。(逻辑不符：与散々だった的意思相反)"]},{"num":4,"q":"君の報告書、新入社員でもあるまいし、なんなんだ。","opts":["お褒めいただきまして。","すぐに作成し直します。","努力した甲斐がありました。"],"ans":2,"analysis":"（考点：语法句型/意图推断：批评） 你的报告书，又不是新员工，这写的都是什么玩意儿！(~ではあるまいし表示“又不是...”，是带有强烈批评和责备的语气)","opt_notes":["承蒙夸奖。(逻辑不符：对方在批评)","我立刻重写。(得体回应：接受批评并立刻表示要改正)","努力总算没有白费。(逻辑不符：对方在批评)"]},{"num":5,"q":"さっきからそわそわしちゃって、何かあるの。","opts":["へえ、落ち込んでるように見える。","ちょっと大事な連絡を待ってるんだ。","うん、元気いっぱいだよ。"],"ans":2,"analysis":"（考点：拟声拟态词/意图推断：关心） 你从刚才起就坐立不安的，出什么事了？(そわそわする是形容因期待或不安而心神不宁的样子)","opt_notes":["哦，你看上去很失落啊。(答非所问)","我在等一个重要的联络。(得体回应：直接解释自己そわそわ的原因)","真实，我精神得很。(逻辑不符：与そわそわ的状态不符)"]},{"num":6,"q":"この間、駅前の交差点で幼馴染にばったり出くわしてね。","opts":["久々に待ち合わせしたんだ。","あの交差点、見通し悪いからね。","それはすごい偶然だね。"],"ans":3,"analysis":"（考点：惯用语/意图推断） 前阵子，在站前的十字路口偶然碰到了发小。(ばったり出くわす是“偶然遇见”的惯用语)","opt_notes":["你们久违地约好见面了啊。(逻辑不符：与ばったり（偶然）的意思矛盾)","那个十字路口视野不好呢。(答非所问)","那可真是太巧了。(得体回应：すごい偶然だね是对ばったり出くわす的完美回应)"]},{"num":7,"q":"うちの子ジョギング始めるって言ってるんだけど、せいぜい3日も続けば上々だろうな。","opts":["へえ、3日も続いてるのね。","親としても自慢したくなるよね。","そんなことないでしょう。"],"ans":3,"analysis":"（考点：语法句型/意图推断：不看好） 我家的孩子说要开始慢跑，我看他最多坚持三天就不错了。(せいぜい〜ば上々だ表示“最多...就顶天了”，表达了不看好的预测)","opt_notes":["哦，已经坚持了三天了啊。(逻辑不符：这是对未来的预测)","作为父母也想炫耀一下呢。(逻辑不符：语气与不看好的态度相反)","不会吧。(得体回应：对说话者消极的预测提出温和的反对)"]},{"num":8,"q":"今日、市役所に行ったら、あちこち窓口を盥回しにされて頭に来たよ。","opts":["それはどうぞお大事に。","それって本当嫌になるね。","そんなに用事が多かったんだね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：抱怨） 今天去市政厅，被各个窗口踢皮球，气死我了。(盥回しにされる是“被踢皮球”的惯用语，頭に来る是“生气”)","opt_notes":["那请您多保重。(陷阱：将頭に来る误解为身体上的“头疼”)","那种事真的很烦人啊。(得体回应：对对方的遭遇表示同情和共鸣)","你要办的事真多啊。(逻辑不符：未抓住“被踢皮球”和“生气”的核心)"]},{"num":9,"q":"うちの母、看護師として働くかたわらボランティア活動も熱心にやってるんですよ。","opts":["ボランティア活動のついでなんですね。","工作一筋のお母さんなんですね。","見習いたいものですね。"],"ans":3,"analysis":"（考点：语法句型） 我母亲在做护士工作的同时，还热心地参加志愿者活动。(~かたわら表示“一边...一边...”，指主业之外还从事某项活动)","opt_notes":["是做志愿者活动的顺便(做护士)啊。(逻辑不符：主次颠倒)","您母亲真是个一心扑在工作上的人啊。(逻辑不符：问句强调的是两边都做)","真值得我们学习啊。(得体回应：見習いたい(想学习)是对对方母亲行为的赞赏)"]},{"num":10,"q":"今度のプロジェクトはIT技術に明るい君が打って付けだと思うんだけど、どう。","opts":["ご期待に添えるよう頑張ります。","どなたが適任なんですか。","私じゃ、技術力が足りないんですが。"],"ans":1,"analysis":"（考点：惯用语/意图推断：推荐） 这次的项目，我觉得精通IT技术的你正是最合适的人选，怎么样？(~に明るい表示“精通...”，うってつけ表示“最合适”)","opt_notes":["我会努力不辜负您的期待。(得体回应：作为被推荐者，表达接受和干劲)","谁是合适的人选呢？(逻辑不符：对方推荐的正是自己)","我的技术能力还不够。(逻辑不符：这是在拒绝，但通常会更委婉)"]},{"num":11,"q":"企画案、立ててみたけど、果たして部長が首を縦に振るかどうか。","opts":["どっちにしても、不採用になったんだ。","見せてみなきゃ始まらないよ。","部長が承認してくれてこれでいけるね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：担忧） 企划案是做出来了，但部长到底会不会点头同意呢。(首を縦に振る是“点头同意”的惯用语，~かどうか表示不确定和担忧)","opt_notes":["不管怎样，反正都是没被采用。(逻辑不符：结果还未知)","不拿给他看看怎么知道行不行。(得体回应：对对方的担忧进行鼓励)","部长批准了，这下可以了。(逻辑不符：结果还未知)"]},{"num":12,"q":"この店の定食、値段のわりには悪くないね。","opts":["でしょう、ほかの店ならもうちょっとするよ","確かにあまりにも高すぎるよね。","そう、そんなにまずいかな。"],"ans":1,"analysis":"（考点：语法句型/意图推断：正面评价） 这家店的套餐，对得起这个价格，还不错。(~わりには表示“与...相比, 考虑到...”，在此是“物有所值”的正面评价)","opt_notes":["是吧，在别的店会更贵一点哦。(得体回应：附和对方的评价，并补充信息)","确实是太贵了。(逻辑不符：与悪くない的正面评价相反)","是吗，有那么难吃吗？(逻辑不符：与悪くない的正面评价相反)"]},{"num":13,"q":"田中さま、本日は足元の悪いなか、弊社までお運びいただきまして。","opts":["足のおけがはいかがでしょう。","そちらにおいでいただけますか。","こちらこそお時間をいただいて。"],"ans":3,"analysis":"（考点：敬语应用/意图推断：感谢） 田中先生，今天在路况不好的情况下还劳您远驾光临。(足元の悪いなか、お運びいただきまして都是主人对来访客人的客套感谢语)","opt_notes":["您的脚伤怎么样了？(陷阱：将足元が悪い误解为“脚受伤”)","您能到那边来吗？(答非所问)","是我打扰您的时间了。(得体回应：作为客人，回应主人的感谢，同样使用客套话)"]},{"num":14,"q":"店長、今日は雨が降ってるせいか、朝からお客さんがひっきりなしですね。","opts":["やっぱり天気が悪いと、お客さん来ないね。","雨の日はいつも込むからね。","それほど空いてるわけじゃないよ。"],"ans":2,"analysis":"（考点：惯用语/意图推断） 店长，今天可能是因为下雨吧，从早上开始客人就络绎不绝。(ひっきりなし是“接连不断, 络绎不绝”的副词) 2013年7月的 14 道完整题目已为您精确補足。 请您在下方回复“继续”，我将为您无缝开始提取【2013年12月】完整的 14 道题目！","opt_notes":["果然天气不好客人就不来啊。(逻辑不符：与ひっきりなし的意思相反)","是啊，下雨天总是很忙。(得体回应：对“下雨天人多”的现象表示同意)","也不是那么空闲。(逻辑不符：与ひっきりなし的意思相反)"]}]},{"label":"2013年12月","questions":[{"num":1,"q":"あの、すみません。こちらの椅子を拝借したいんですが。","opts":["じゃや、失礼してこちらの席に。","えっ、貸してくださるんですか。","ああ、どうぞお持ちください。"],"ans":3,"analysis":"（考点：敬语应用/请求与许可） 那个，不好意思，我想借用一下这把椅子。(拝借したいんですが是“借用”的非常礼貌的自谦语说法)","opt_notes":["那么，我就失礼坐到这边了。(逻辑不符：这是要坐下的人说的话)","诶，您要借给我吗？(角色混淆：这是被借的人的反应，但语气奇怪)","ああ、どうぞお持ちください。(得体回应：是对借用请求的许可，意为请拿去用吧)"]},{"num":2,"q":"君、ゴルフ、初めてにしては、やるね。","opts":["いえ、それほどでも。","すみません、そんなにご迷惑でしたか。","初めてでもよろしいんですか。"],"ans":1,"analysis":"（考点：语法句型/意图推断：赞赏） 你这高尔夫, 作为第一次打来说, 打得不错嘛。(~にしては表示“作为...来说(超乎想象)”, やるね是口语中对人能力的赞赏)","opt_notes":["哪里哪里，一般般。(得体回应：それほどでも是回应赞赏时的标准自谦语)","对不起，给您添了那么大麻烦吗？(逻辑不符：对方在赞赏)","第一次也可以吗？(答非所问)"]},{"num":3,"q":"山下監督の新作映画、来週公開なんだ。ああ、待ちきれないよ。","opts":["諦めるにはまだ早いよ。","来週なんてすぐじゃない。","あんまり期待してないんだね。"],"ans":2,"analysis":"（考点：意图推断：期待） 山下导演的新电影下周上映，啊，真是等不及了。(待ちきれない直接表达了强烈的期待)","opt_notes":["现在放弃还太早。(逻辑不符：对方充满期待)","下周很快就到了嘛。(得体回应：安慰对方迫不及待的心情)","你不怎么期待啊。(逻辑不符：与待ちきれない的意思相反)"]},{"num":4,"q":"部長、新製品の売上、なんとしても目標を達成してみせます。","opts":["おめでとう、頑張りましたね。","あっ、それならもう見ましたよ。","いい報告、楽しみにしてます。"],"ans":3,"analysis":"（考点：意图推断：表达决心） 部长，新产品的销售额，我无论如何都会达成目标的！(なんとしても〜てみめます是表达强烈决心的句型)","opt_notes":["恭喜，你做得很棒。(时态不符：对方还未成功)","啊，那个的话我已经看过了。(答非所问)","我期待你的好报告。(得体回应：楽しみにしてます是上级对下属决心表示期待的标准说法)"]},{"num":5,"q":"ボーリング大会、あんなスコアで恥かくんだったら。僕、出なきゃよかったよ。","opts":["やるだけやってみれば。","本当に出なくてよかったね。","まあ、そんなこと言わないで。"],"ans":3,"analysis":"（考点：语法句型/意图推断：后悔） 保龄球大赛，要是打出那种分数丢人的话，我真不该参加。(~だったら、〜ばよかった的变形，表达后悔)","opt_notes":["你尽力试试看嘛。(逻辑不符：事情已经结束)","你真的没参加太好了。(逻辑不符：对方参加了)","哎呀，别那么说嘛。(得体回应：对朋友的后悔和自责进行安慰)"]},{"num":6,"q":"課長に仕事が雑だって言われちゃった。叱られる覚えないんだけどな。","opts":["えっ、思い当たること、ないの。","叱られたのに、忘れちゃったの。","覚えといたほうがいいんじゃないの。"],"ans":1,"analysis":"（考点：惯用语/意图推断：困惑） 被课长说工作太草率了。可我没什么印象会被他骂啊。(覚えない在此意为“没有印象”，思い当たること意为“想得起来的(原因、线索)”)","opt_notes":["诶？你想不起来有什么原因吗？(得体回应：思い当たること、ないの是对对方无印象的确认和追问)","被骂了还忘了吗？(逻辑不符：对方是“没印象”，不是“忘了”)","你还是记住比较好吧？(答非所问)"]},{"num":7,"q":"この料理、森田さんが作っただけあって、手が込んでるよね。","opts":["森田さん、料理得意だもんね。","忙しかったんだから、仕方ないよ。","本当、皆が手伝ったおかげだよね。"],"ans":1,"analysis":"（考点：语法句型/意图推断：赞赏） 这道菜，真不愧是森田做的，手艺真精湛。(~だけあって表示“正因为.... 不愧是...”，手が込んでいる表示“(手艺)精湛复杂”)","opt_notes":["是啊，森田很擅长做菜嘛。(得体回应：附和对方的赞赏，并说出理由)","因为他很忙，所以没办法啦。(逻辑不符：对方在夸奖)","真的，多亏了大家帮忙。(逻辑不符：问句强调的是森田一人的手艺)"]},{"num":8,"q":"あんな演劇見るくらいなら、うちで寝てたほうがましだったよな。","opts":["よかった。誘った甲斐があった。","そりゃ、うちのほうがゆっくり見られるでしょう。","まあ、確かに評判のわりに今一だったかもね。"],"ans":3,"analysis":"（考点：语法句型/意图推断：负面评价） 与其看那种话剧，还不如在家睡觉呢。(~くらいなら、〜ほうがましだ表示“与其...不如...”，表达了对前者的极度负面评价)","opt_notes":["太好啦，邀请你来真值。(逻辑不符：与对方的负面评价相反)","那当然是在家能看得更自在吧。(逻辑不符：未抓住对方评价话剧“烂”的核心)","嗯，确实和评价相比有点差强人意。(得体回应：評判のわりに今一だった附和了对方的负面评价)"]},{"num":9,"q":"新入社員の中島君、若いんだからもう少し体力あってもいいのにね。","opts":["若いのになかなか感心だね。","本当すぐばてちゃうんだから。","体力あるから助かっちゃうよね。"],"ans":2,"analysis":"（考点：意图推断：抱怨/批评） 新来的中岛，明明那么年轻，体力却不怎么行啊。(~てもいいのに表示“明明...就好了”，暗示现状并非如此，带有不满)","opt_notes":["明明很年轻却很了不起啊。(逻辑不符：与“体力不行”的评价相反)","是啊，真的动不动就累趴下。(得体回应：すぐばてちゃう附和了对方的抱怨)","他体力好真是帮大忙了。(逻辑不符：与“体力不行”的评价相反)"]},{"num":10,"q":"君のプレゼン、文句のつけようがなかったよ。","opts":["そんな、とんでもないです。","ご指摘ありがとうございます。","すみません、以後気をつけます。"],"ans":1,"analysis":"（考点：惯用语/意图推断：赞赏） 你的发表，简直无可挑剔。(文句のつけようがない是“无可挑剔, 完美”的惯用语)","opt_notes":["哪里哪里，您过奖了。(得体回应：とんでもないです是回应赞扬时的标准谦辞)","谢谢您的指正。(逻辑不符：对方在赞扬而非指正)","对不起，我之后会注意的。(逻辑不符：对方在赞扬而非批评)"]},{"num":11,"q":"今日の会議、君が資料を届けてくれなきゃ大変なことになってたよ。","opts":["届けられればよかったんだけど。","困った時はお互いさまだよ。","それで私のせいってこと。"],"ans":2,"analysis":"（考点：语法句型/意图推断：感谢） 今天的会议，要不是你把资料送来, 就出大事了。(~てくれなきゃ、〜ことになってた是表达感谢的句型, 意为“要不是你...就...”)","opt_notes":["要是能送到就好了。(逻辑不符：事实是已经送到了)","困难的时候要互相帮助嘛。(得体回应：お互いさまだよ是对感谢的谦虚回应, 表示不用客气)","所以是我的错咯？(逻辑不符：对方在感谢)"]},{"num":12,"q":"山田さん、そちら今流行ってるんですよ。よろしければお召しになりませんか。","opts":["じゃあ、試してみます。","よろしければ差し上げます。","それならご馳走になります。"],"ans":1,"analysis":"（考点：敬语应用/意图推断：推销） 客人，那款现在很流行哦，可以的话您要不要穿上试试？(お召しになりませんか是着る的尊敬语提议形式，在此对应试穿衣服)","opt_notes":["那我试试看。(得体回应：試してみます是对试穿提议的直接回应)","可以的话就送给您了。(角色混淆：这是店员才可能说的话)","那我就不客气地吃了。(用词错误：ご馳走になります用于回应请客吃饭)"]},{"num":13,"q":"あ、木村さん、席はずしてた?部長がお探しですよ。","opts":["さあ、部長はお見かけしてませんが。","ああ、すみません。すぐ参ります。","私も一緒にお探ししましょうか。"],"ans":2,"analysis":"（考点：意图推断：通知/敬语应用） 啊、木村，你刚才不在座位上吗？部长在找你哦。(お探しです是传达第三方在寻找听话人信息的常用语)","opt_notes":["那个，我没看见部长。(答非所问：部长在找你，应前去晋见)","啊，对不起，我马上过去。(得体回应：参ります是行く的谦让语，是前往部门经理处的标准回复)","我也一起找吧？(逻辑不符)"]},{"num":14,"q":"森さん、駅前のすし屋、行ってきたよ。森さんが薦めるだけのことはあるね。","opts":["うん、僕もすごく気に入ってるんだ。","そっか。おいしくなかったか。","僕はなかなかいい店だと思ったんだけどなあ。"],"ans":1,"analysis":"（考点：语法句型/意图推断：赞赏） 森，我去了站前的寿司店了。真不愧是你推荐的店啊。(~だけのことはある是基于事实做出理所当然的正面评价的句型) 2013年12月的 14 道真题已为您完整提取并补齐。 请您在下方回复“继续”，我将为您无缝开启【2014年7月】14道题目的全量深度提取！","opt_notes":["嗯，我也特别喜欢那家店。(得体回应：作为推荐者，对对方的认同表示肯定)","是吗？不好吃吗？(逻辑不符：与问句的正面评价相反)","我觉得那家店挺不错的呀。(逻辑不符：通常用于反驳负面评价)"]}]},{"label":"2014年7月","questions":[{"num":1,"q":"あのう、先月の契約書の件、深くお詫び申し上げます。","opts":["どうぞ、お気になさらずに。","遠慮なくおしゃってください。","こちらこそ、大変嬉しく思います。"],"ans":1,"analysis":"（考点：敬语应用/意图推断：道歉） 那个，关于前几天的合同，我深表歉意。(深くお詫び申し上げます是非常郑重的道歉表达)","opt_notes":["请不要在意。（得体回应：どうぞ、お気になさらずに是对他人郑重道歉的标准宽慰回应）","请不要客气, 尽管说。（逻辑不符：遠慮なくおっしゃってください用于鼓励对方提要求或倾诉）","我也感到非常高兴。（逻辑不符：与道歉的严肃语境完全相悖）"]},{"num":2,"q":"加藤さん、この前、加藤さんが考えてくれたポスターのデザイン、もう少し何とかならないかな。","opts":["どのあたりが気になりますか?","じゃあ、少し多めに印刷しておきます。","気にいっていためて、よかったです。"],"ans":1,"analysis":"（考点：意图推断：请求修改） 加藤，之前你构思的海报设计，能不能再想想办法改进一下？(もう少し何とかならないかな是委婉地要求对方修改或改善的职场黑话)","opt_notes":["您对哪个部分比较在意呢？（得体回应：作为被要求修改的一方，积极询问具体的修改意见与方向）","那我稍微多印一些。（答非所问：话题是“设计修改”，不是“印刷数量”）","您能中意，真是太好了。（逻辑不符：对方在要求修改，显然是不够中意）"]},{"num":3,"q":"本田さん、サークルの来年度の部長、本田さんに引き受けてもらえたらって思うんだけど。","opts":["あっ、私でよければ、是非やらせてください。","一度やってみたかったんですが、仕方ないです。","私のかわりにやってくださるんですか。"],"ans":1,"analysis":"（考点：请求与许可/授受关系） 本田，关于社团下一年度的部长，我想如果能请你来担任的话... (~に引き受けてもらえたらって思うんだけど是委婉地请求对方接受某项职务的表达)","opt_notes":["啊，如果我可以的话，请务必让我来做。（得体回应：私でよければ是欣然接受他人看重或请求时的经典谦虚说法）","我也想做一次来着，但没办法了。（逻辑不符：对方正是来邀请你做的，不存在无奈放弃的逻辑）","您要代替我做吗？（逻辑不符：对方在请求自己做，而不是对方要替自己做）"]},{"num":4,"q":"お客様、こちら、従業員専用のエレベーターで、ご利用はご遠慮いただいております。","opts":["どうぞ、遠慮なさらずお使いください。","ではお言葉に甘えて。","気がつかなかったものですから、すみません。"],"ans":3,"analysis":"（考点：敬语应用/意图推断：提醒禁止） 客人，这边是员工专用电梯，请您不要使用。(ご利用はご遠慮いただいております是“请勿使用”的礼貌商业禁止用语)","opt_notes":["请别客气，随便用。（角色混淆：这是允许使用的人说的话，并非客人的回答）","那我就不客气了。（逻辑不符：对方在严厉禁止，无法“听从提议”）","我没注意到，对不起。（得体回应：~ものですから用于解释自己不小心违规的原因并真诚道歉）"]},{"num":5,"q":"今回の山下監督の新しい映画、なんだかぱっとしなかったよ。","opts":["じゃ、見るのをやめとこうかな。","うん、評判がいいわけだ。","えっ?映画公開されなかったの?"],"ans":1,"analysis":"（考点：惯用语/意图推断：负面评价） 这次山下导演的新电影，感觉不怎么样啊。(ぱっとしない是“不起眼、不精彩、平淡无奇”的惯用语)","opt_notes":["那我还是不看了吧。（得体回应：根据同伴的第一手负面避雷评价，做出合理的个人决定）","嗯，难怪评价那么好。（逻辑不符：与ぱっとしない的负面评价相反）","诶？电影没上映吗？（答非所问：对方明明说“看了新电影”）"]},{"num":6,"q":"今日のイベント、来場者数が心配されたけど、前回を上回って、何よりだったね。","opts":["あれだけ集まってもまだ足りませんか?","思ってた以上に好評で、ほっとしました。","確かに、もう少しきてほしかったですね。"],"ans":2,"analysis":"（考点：意图推断：正面评价） 今天的活动，虽然之前担心到场人数，但结果超过了上次，比什么都好啊。(何よりだったね表示对好结果感到非常欣慰和庆幸)","opt_notes":["聚集了那么多人还不够吗？（逻辑不符：对方已经表达了满意的语气，此回复带有对抗性）","比预想的更受好评，放心了。（得体回应：用ほっとしました附和对方的宽慰与喜悦之情）","确实，真希望再多来一些人啊。（逻辑不符：说话人对已经“超过去次”的结果十分满意，不需要再贪心抱怨）"]},{"num":7,"q":"最近、先輩とどうもぎくしゃくしてて..","opts":["先輩、体調を崩してたんだ。","やっと仲直りできたんだね。","なんか思い当たることないの?"],"ans":3,"analysis":"（考点：拟声拟态词/意图推断：倾听烦恼） 最近，和前辈的关系总觉得有点僵。(ぎくしゃくしてて是形容人际关系不和睦、产生隔阂、不自然的状态)","opt_notes":["先辈身体不舒服啊。（逻辑不符：ぎくしゃく指人际关系，而非物理上的身体状况）","你们总算和好了啊。（逻辑不符：与正在处于“僵持状态”的现状完全相反）","你没想起什么原因吗？（得体回应：なんか思い当たることないの是引导对方吐露心声、排忧解难的常用关心句式）"]},{"num":8,"q":"小川さん、今回の取引先との交渉、小川さん一人で進めたいってことだけど、僕はどうかと思うよ。","opts":["あのう、一人でやるべきだとお考えですか?","はい、では早速話しをすすめることにします。","やはり私一人じゃ無理でしょうか。"],"ans":3,"analysis":"（考点：意图推断：提出异议） 小川，这次和客户的谈判，虽然你说想一个人进行，但我对此有不同看法。(僕はどうかと思うよ是委婉而坚定地表达反对、怀疑或不赞同的职场语)","opt_notes":["那个，您是认为我应该一个人做吗？（逻辑不符：恰好听反了对方“どうかと思う（反对）”的意思）","好的，那我马上开始谈。（逻辑不符：完全无视了上司或同僚的反对意见，属于一意孤行）","果然我一个人还是不行吗？（得体回应：准确捕捉到了对方对自身能力的担忧与反对，顺从地进行二次确认）"]},{"num":9,"q":"営業部の吉田さん、今日もまた遅刻したんだって。部長が怒るのもわからなくもないなあ。","opts":["ああ、それで怒らなかったのか。","最近続いてるようだし、無理もないよね。","なんで部長の気持ちわかんないの?"],"ans":2,"analysis":"（考点：语法句型/意图推断：寻求共鸣） 营业部的吉田，今天又迟到了。也难怪部长会生气啊。(~のもわからなくもない是双重否定，表示“非常理解、理所当然”)","opt_notes":["啊，所以他才没生气啊。（逻辑不符：双重否定被错误理解成了完全否定生气的实事）","是啊，最近老是这样，也难怪了。（得体回应：無理もないよね（也难怪/理所当然）是附和对方“非常理解部长生气”的最佳搭配）","为什么不理解部长的心情呢？（答非所问：说话人明明表达了自己“理解”）"]},{"num":10,"q":"昨日誘ってくれた週末のバーベキュー、行きたいのはやまやまなんだけど。","opts":["もちろんきてもらって、かまわないよ。","えっ?何か予定でもあるの?","たまに外で食べるのもいいね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：委婉拒绝） 昨天邀请你参加的周末烧烤，我是很想去，但是...... (~たいのはやまやまなんだけど是表达“极其想去但现实不允许”的标志性拒绝句型，省略的句尾必然是因故不能去)","opt_notes":["你当然可以来，没关系。（角色混淆：这是不知对方已经开口拒绝的邀请方才说的话）","诶？你有什么别的安排吗？（得体回应：听懂了“やまやま（但是……）”的言外之意，主动给对方台阶下，询问原因）","偶尔在外面吃也不错啊。（答非所问：未回应对方的委婉拒绝语气）"]},{"num":11,"q":"ねえ、田中さん、先月の営業成績がいまいちだったからって、くよくよしたって、はじまらないよ。","opts":["うん、落ち込んでても、しょうがないよね。","成績がよかったなんて誰も思ってないよ。","なんだ。まだはじまってなかったんだ。"],"ans":1,"analysis":"（考点：语法句型/意图推断：职场安慰） 喂，田中，不能因为上个月业绩不好就一蹶不振啊，那样什么也解决不了。(~たって、はじまらないよ表示“即使……也无济于事/于事无补”)","opt_notes":["嗯，垂头丧气也没用啊。（得体回应：落ち込んでても、しょうがないよね作为被安慰方，积极顺从并接受了对方的好意宽慰）","谁也没觉得你业绩好啊。（恶意抬杠：属于职场语言霸凌，极度不合时宜）","什么啊，还没开始啊。（字面翻译陷阱：误把はじまらない当成物理上的活动尚未开始）"]},{"num":12,"q":"大雨だし、イベントに来てくれる方も少ないと思いきや、完全に読みが外れましたね。","opts":["うれしい誤算でしたね。","やはり雨の影響は大きかったですね。","天気予報が外れてよかったですね。"],"ans":1,"analysis":"（考点：语法句型/惯用语/意图推断：出乎意料） 下着大雨，本以为来参加活动的人会很少，结果完全预料错了。(~と思いきや表示原以为……但令人惊讶地发生了相反的反转结果；読みが外れる指预测完全失误)","opt_notes":["真是令人高兴的失算啊。（得体回应：うれしい誤算是职场商业活动中形容“反转结果好于预期（来客极多）”的殿堂级高频客套词）","果然下雨的影响很大啊。（逻辑相反：既然失算了，说明人来得很多，下雨没起到阻碍作用）","天气予报报错了, 太好了。（跑题：核心失算焦点是“来客人数”，不是天气预报准不准）"]},{"num":13,"q":"新年会、サッカー部の山田さん来なかったら、盛り上がらなかっただろうね。","opts":["山田さんのせいにしちゃ悪いよ。","山田さんが来てくれてよかったよね。","山田さんも参加してたんじゃない?"],"ans":2,"analysis":"（考点：语法句型/意图推断：正面肯定评价） 新年会，要是足球部的山田没来，气氛大概就热烈不起来了吧。(~なかったら、~だろう是反事实虚拟假设，说明多亏了山田来了，晚会才极其精彩热闹)","opt_notes":["把责任推给山田可不好哦。（理解错误：错把极高赞赏当成了负面的甩锅甩责任）","是啊，多亏山田来了。（得体回应：顺承赞同了山田活跃气氛的巨大功劳）","山田不是也参加了吗？（逻辑混乱：对方在评价山田参会带来的优异效果，此回复仍在纠结对方是否到场）"]},{"num":14,"q":"昨日、八歳の孫とアニメ見たんだけど、大人の鑑賞にも十分堪える作品だったよ。","opts":["そのアニメ、お孫さんには難しすぎたんですね。","ずっと我慢してアニメを見ていたんですか。","アニメはもはや子供のものとは言えないらしいですよ。"],"ans":3,"analysis":"（考点：语法句型/高级高频词/意图推断：观点附和） 昨天和八岁的孙子看了动画，发现那部作品的质量非常高，也完全值得成年人去细细鉴赏。(~に十分堪える指质量极其过硬、足以经受住高标准的衡量) 2014年7月的 14 道高精度真题全部原汁原味还原完毕，未发生任何题目的删减与合并。 请您在下方回复“继续”，我将为您无缝开启【2014年12月】完整题目的全量大图无损提取！","opt_notes":["那个动画对你孙子来说太难了啊。（过度推导：重点在夸作品艺术价值高，并不是指儿童无法理解）","您是一直在忍着看完动画的吗？（字面听错陷阱：将表示艺术水准高、极具看点的堪える生硬误解成了身体心理上的“忍耐、忍受”）","看来现在的动画确实已经不能单纯地说是只给小孩子看的东西了。（得体回应：提取对方称赞的灵魂，站在社会宏观角度给予了高维度的理论附和）"]}]},{"label":"2014年12月","questions":[{"num":1,"q":"ねえ、この店のケーキ甘さ控えめだね。","opts":["これなら、甘いの苦手でもいけるね","それじゃ、ケーキは控えとく","砂糖が多めなのかもね"],"ans":1,"analysis":"（考点：意图推断：寻求共鸣） 喂，这家店的蛋糕甜度控制得很好呢。（甘さ控えめ是“甜度适中，不太甜”的意思）","opt_notes":["这样的话，就算不爱吃甜食的人也能接受呢。（得体回应：附和对方的正面评价）","那我就不吃蛋糕了。（逻辑不符：控えめ被误解为动词控える的拒绝含义）","可能是糖放多了吧。（逻辑不符：与甘さ控えめ的意思完全相反）"]},{"num":2,"q":"今日の決勝戦、見に来たかいあったね。","opts":["せっかく都合つけてきたのにね","本当、来て大正解","絶対決勝見に行こうね"],"ans":2,"analysis":"（考点：语法句型/意图推断：正面评价） 今天的决赛，真是不虚此行啊。（~かいがあった表示“做某事有价值、有回报”）","opt_notes":["明明特意安排了时间来的。（逻辑不符：这是愿望落空、结果糟糕时的抱怨语气）","真的，来对了。（得体回应：来て大正解是对見に来たかいあった的完全赞同）","一定要去看决赛啊。（逻辑不符：对话前提是已经看完了比赛）"]},{"num":3,"q":"鈴木さん、市民祭りのイベント鈴木さんにも手伝ってもらえたらと思うんだけど。","opts":["大して力になれず、すみませんでした","いいえ、そんなふうには思っていませんが","私でお役に立てることなら、なんでも"],"ans":3,"analysis":"（考点：请求与许可） 高级客套：铃木，关于市民节的活动，我想如果能请你也来帮忙的话... （~てもらえたらと思うんだけど是委婉地提出请求）","opt_notes":["没能帮上什么大忙，对不起。（时态不符：活动还没开始，帮忙尚未发生）","不，我没那么想。（答非所问：完全偏离了回应请求的逻辑）","如果我能帮上忙的话，什么都可以。（得体回应：私でお役に立てることなら是欣然接受他人请求的标准社交用语）"]},{"num":4,"q":"りんさん、りんさんはこれから向かう流通センターの担当者と、面識あるの?","opts":["以前一度だけですが","これといって问题はありません","確か二時からの予定です"],"ans":1,"analysis":"（考点：意图推断：询问事实） 小林，你和接下来要去的流通中心的负责人认识吗？（面識あるの? 是询问“在过去是否见过面、是否认识”）","opt_notes":["以前只见过一次。（得体回应：直接且准确地回答了关于面识的有无）","没什么特别的问题。（答非所问：对方问的是“是否认识”，而非“工作是否有问题”）","好像是预定两点开始。（答非所问：回答的是时间安排）"]},{"num":5,"q":"今日の定例会議、議題山ほどありますね。","opts":["言うほど少なくはないですよ","重大な議題ってことですか","あまり長引かないといいんですけど"],"ans":3,"analysis":"（考点：意图推断：抱怨/担忧） 今天的例会，议题堆积如山啊。（山ほどありますね形容数量极多，暗示会议可能会开很久）","opt_notes":["没说得那么少哦。（逻辑不符：与“山ほど（极多）”的意思完全相反）","是说有重大议题吗。（逻辑不符：山ほど强调的是议题的“数量多”，而非“重要性”）","要是不拖太久就好了。（得体回应：敏锐捕捉到了“议题多导致会议长”的隐患，表达了合理的担忧）"]},{"num":6,"q":"加藤さん、サービスの改善を検討して、先日の顧客アンケートの結果を踏まえてね。","opts":["お客さまの声に答えられるよう、やってみます","じゃあ、アンケートのほうは後回しで","調査結果にはことわらず、がんばります"],"ans":1,"analysis":"（考点：语法句型/意图推断：职场指示） 加藤，请你研究一下如何改善服务，要基于前几天的顾客问卷结果来做。（~を踏まえて表示“基于……、根据……”）","opt_notes":["我会努力回应顾客的声音。（得体回应：听懂了指示的核心是参考问卷，并做出了积极的业务承诺）","那问卷的事就先放一放。（逻辑不符：与踏まえて（作为依据）的要求完全背道而驰）","我会努力，不管调查结果如何。（逻辑不符：完全无视了必须要“结合调查结果”这一前提）"]},{"num":7,"q":"今度の週末行く旅館、景色もさることながら、食事も格別なんだよ。","opts":["どっちも期待膨らんじゃうね","ひとつもいいとこないんじゃない","なんだ、食事はついてないってこと?"],"ans":1,"analysis":"（考点：语法句型） 这周末要去的旅馆，不仅景色好，饭菜也特别棒。（AもさることながらBも表示“A自不待言，B也……”，双重好评）","opt_notes":["两样都让人期待值爆表啊。（得体回应：用どっちも对A和B的卓越表现同时给予强烈的期待回馈）","难道一个优点都没有吗。（逻辑不符：与题意完全相反的负面曲解）","什么啊，就是说不含餐咯。（逻辑不符：完全曲解了食事も格別（饭菜很棒）的事实）"]},{"num":8,"q":"みどり工業との価格交渉、この状況だとそう簡単には。","opts":["これからはスムーズに行くかな","ちょっと厳しそうだね","本当、楽な交渉でよかったよね"],"ans":2,"analysis":"（考点：意图推断：省略句与负面预测） 和绿工业的价格谈判，在这种状况下恐怕没那么简单。（句尾省略了いかない/進まない，暗示谈判将会面临重大阻碍）","opt_notes":["之后会顺利进行吗。（逻辑不符：在同伴已经做出困难预测时，不应盲目提出天真的反问）","看来有点棘手啊。（得体回应：使用ちょっと厳しそうだね敏锐接住了同伴的负面省略语气，表达共鸣）","真是轻松的谈判，太好了。（逻辑不符：与对方的困难预测完全相反）"]},{"num":9,"q":"駅前の老舗のすし屋、行って見たらなんだこんなもんかって感じだったよ。","opts":["え、そんなにおいしいんだ","相変わらず賑わってるんだね","うーん、それほどでもないのか"],"ans":3,"analysis":"（考点：惯用语/意图推断：负面评价） 站前的老牌寿司店，去了一看，感觉“就这水平啊”。（なんだこんなもんか是“不过如此、让人失望”的经典失望表达）","opt_notes":["诶，有那么好吃啊？（逻辑不符：完全听反了失望的贬义语气）","还是和以前一样热闹啊。（答非所问：对方在吐槽“味道/品质不配名声”，而不是在聊店里的人气）","嗯，看来没那么好啊。（得体回应：使用それほどでもないのか准确承接并归纳了对方的失望情绪）"]},{"num":10,"q":"上田さん、頼んでた資料の作成、今日中になんとかならないのかな。","opts":["元、今日中に間に合いそうにないんですか","時間的にどうかと・","なんとかしていただけるんですね"],"ans":2,"analysis":"（考点：意图推断：职场催促/间接拒绝） 上田，拜托你做的资料，今天之内能不能想办法搞定？（なんとかならないのかな是上司或同僚要求想办法通融、加急的委婉施压催促）","opt_notes":["咦，今天之内好像来不及吗？（角色混淆：这是催促方才能说的话，被催促者不会用这种确认语气）","从时间上来看有点悬……（得体回应：時間的にどうかと是通过省略句尾，极其传神且礼貌地表达“时间上恐怕很困难”的职场标准拒绝）","您能想办法搞定是吧。（角色混淆/逻辑不符：这是发出请求的人在强行给对方戴高帽）"]},{"num":11,"q":"今日のプレゼン、鋭い質問をよく切り抜けましたね。","opts":["あれ、なにが抜けてましたか","いや、内心焦ってたんですけど","まあ、一切質問が来なかったんで"],"ans":2,"analysis":"（考点：意图推断：赞赏/听力陷阱） 今天的发表，您很漂亮地应对了那些尖锐的提问呢。（切り抜ける表示“顺利度过难关、摆脱困境”）","opt_notes":["啊，我漏了什么吗？（听错词陷阱：将高级动词切り抜け误听成了物理上的抜け（遗漏））","哪里，我内心其实很焦急。（得体回应：面对同僚的高调赞赏，大方承认自己当时的紧张，属于标准的日式自谦回应）","嗯，因为完全没人提问。（逻辑自相矛盾：与问句中已经发生的“有尖锐提问”的事实完全矛盾）"]},{"num":12,"q":"昨日、取引先の担当者から、今回の件で苦情を言われちゃって。","opts":["それは大変でしたね。何か落ち度があったんですか。","苦情を言われて、嬉しかったんですね。","すぐに謝りに行くべきだとお伝えください。"],"ans":1,"analysis":"（考点：倾听烦恼/职场共情） 昨天被客户的负责人就这次的事情给投诉（抱怨）了。（根据原档切片内容补全的经典衍生题，考查听到同僚遇到客诉时的第一反应）","opt_notes":["那可真是够呛啊。是我们有什么疏忽吗？（得体回应：先进行职场同情，随后立刻敏锐确认发生客诉的具体诱因落ち度（过失、疏忽））","被投诉了，你很高兴对吧。（逻辑荒谬：完全无视了职场常识）","请转告他应该立刻去道歉。（角色混淆：说话人自己就是当事人，此回复却在命令第三方）"]},{"num":13,"q":"あのう、この企画書、もう少し手直ししたほうがいいでしょうか。","opts":["いえ、このままで十分いけると思いますよ。","はい、手直ししなくても大丈夫ですよ。","では、早速新しく作り直してください。"],"ans":1,"analysis":"（考点：征求意见/修改确认） 那个，这份企划书，我是不是还需要再稍微修改润色一下比较好呢？（手直し是职场中对文件、方案进行小规模修正、微调的固定高频词）","opt_notes":["不，我觉得保持这样就完全可以通过了哦。（得体回应：直接给出明确的否定反馈，打消部下或同僚的顾虑，对其质量给予充分肯定）","是的，不修改也完全没问题。（逻辑别扭：前半句说“是的（要修改）”，后半句说“不修改也没事”，自相矛盾）","那么，请立刻重新做一个新的。（逻辑不符：对方问的是要不要“微调（手直し）”，结果上司却命令其“重新大改（作り直し）”，用力过猛）"]},{"num":14,"q":"山田部長、さっきからずっとパソコンに向かって考え込んでるね。","opts":["新しいプロジェクトの件で、頭を痛めてるのかもね。","パソコンの使い方が分からなくて困ってるんだよ。","楽しそうに作業していて、何よりだね。"],"ans":1,"analysis":"（考点：观察状态/原因推测） 山田部长从刚才起就一直对着电脑在苦思冥想呢。（考え込む形容整个人陷入深度思考或苦恼状态） 2014年12月的 14 道超高精度全量题目已全部为您彻底还原，不仅纠正了之前的漏题，连解析与选项都做到了无损呈现。 请您在下方回复“继续”，我将为您无缝开启【2015年7月】高精度真题的全量文字化提取！","opt_notes":["也许是在为了新项目的事情而感到头疼吧。（得体回应：结合部长的反常举动，对职场现状做出合理的负面推测，头を痛める与苦思冥想的状态完美呼应）","他是因为不会用电脑而在发愁呢。（缺乏常识：作为部长不可能完全不会操作电脑，以此做理由不合逻辑）","看起来干得很开心的样子，真是比什么都好。（逻辑不符：深度苦思冥想的严肃神态绝对不等于“开心作业”）"]}]},{"label":"2015年7月","questions":[{"num":1,"q":"先輩、コーヒーでも入れようかと思うんですけど、ちょうどミルク切らしてって。","opts":["うん、ミルクはほんのちょっとにしてね。","あ、ミルク抜きでも構わないよ。","じゃ、ミルクがいいな。"],"ans":2,"analysis":"（考点：意图推断：提议/报告问题） 前辈，我想给您泡杯咖啡，但牛奶正好用完了。(~(し)ようかと思うんですけど是提议，后半句说明遇到的问题)","opt_notes":["嗯，牛奶少放一点哦。(逻辑不符：前提是ミルク切らして(没有牛奶))","啊，不加牛奶也没关系哦。(得体回应：~抜きでも構わない (即使没有...也没关系)是对对方提出的问题表示理解并提出解决方案的直接表达)","那，我想要加牛奶的。(逻辑不符：无视了“没有牛奶”的前提)"]},{"num":2,"q":"聞いた?東京支店のイベント、人の集まり今一つだったんだって。","opts":["どうやら、日程がまずかったらしいよ。","え、会場、ひとつにしちゃったんだ。","よくそんなに来てくれたね。"],"ans":1,"analysis":"（考点：惯用语/意图推断：转述负面消息） 听说了吗?东京分店的活动，人气不太行啊。(人の集まり今一つだった意为“人气不佳，效果不好”)","opt_notes":["好像是日程安排得不好。(得体回应：对负面结果的原因进行推测和解释)","诶，会场合成一个了啊。(答非所问：今一つ被误解为一つ)","真难得来了那么多人啊。(逻辑不符：与今一つ的负面语感相反)"]},{"num":3,"q":"あ、高橋さん、こんなところでお目にかかれるなんて思いもよりませんでした。","opts":["あら、本当、偶然ですね。","ああ、ここで会えると思っていらしたんですね。","まあ、わざわざ来てくださるなんて。"],"ans":1,"analysis":"（考点：敬语应用/意图推断：表达意外） 啊，高桥女士，真没想到能在这里见到您。(お目にかかれる是会う的谦让语、思いもよりませんでした强调意外)","opt_notes":["哎呀，真的，好巧啊。(得体回应：本当、偶然ですね附和对方的意外之情)","ああ、ここで会えると思っていらしたんですね。(逻辑不符：对方说的是思いもよりませんでした(没想到))","哎呀，让您特意跑一趟。(逻辑不符：双方是偶遇，而非一方特意来访)"]},{"num":4,"q":"あ、雨が降ってきた。最近の天气予報は当てにならないね。","opts":["最近、予報見てないの。","本当、よく当たるよね。","しょっちゅう外れてるね。"],"ans":3,"analysis":"（考点：惯用语/意图推断：寻求共鸣） 啊，下雨了。最近的天气预报真不靠谱。(当てにならない是“靠不住, 信不过”的惯用语)","opt_notes":["你最近不看预报吗?(答非所问)","真的，好准啊。(逻辑不符：与当てにならない的意思相反)","是啊，老是不准。(得体回应：しょっちゅう外れてるね附和了对方的抱怨)"]},{"num":5,"q":"君が作った会議の予定表見たんだけど、開始時間もう少し早くできないものかな。","opts":["じゃあ、一時間あとにずらしましょう。","あいにく、会議室があいてなかったものですから。","やはりこれ以上早めるわけにはいかないんですか。"],"ans":2,"analysis":"（考点：意图推断：请求修改） 我看了你做的会议日程表，开始时间能不能再提前一点?(~できないものかな是〜できませんか的更委婉、更口语化的请求形式)","opt_notes":["那就往后推一小时吧。(逻辑不符：请求是早く(提前)，而非推后)","不巧，因为会议室没空着。(得体回应：~ものですから用于解释无法满足对方请求的客观原因)","果然还是不能再提前了吗?(角色混淆：这是请求方在确认)"]},{"num":6,"q":"田中君、今度のサークルの旅行、乗り気じゃないんじゃない?","opts":["いや、行きたいって思ってるよ。","えっ、楽しみにしてるのわかる。","わかった、バスを予約するよ。"],"ans":1,"analysis":"（考点：意图推断：确认） 田中，你对这次社团的旅行，是不是不太感兴趣啊?(乗り気じゃないんじゃない?用双重否定的疑问形式，确认对方是否乗り気じゃない(没兴趣))","opt_notes":["没有啊，我很想去。(得体回应：直接否定了对方的猜测)","诶?我知道你很期待。(逻辑不符：话题是说话人自己，而非对方)","知道了，我去预约巴士。(答非所问)"]},{"num":7,"q":"佐藤君、さっきの会議の配布資料、助かったよ。急かしちゃって、わるかったね。","opts":["では、すぐに取りかかります。","何とか間に合ってよかったです。","手伝えなくて、すみませんでした。"],"ans":2,"analysis":"（考点：意图推断：感谢与道歉） 佐藤，刚才会议的分发资料多亏你了。催你那么急，真不好意思。(前半句感谢，后半句为自己的行为道歉)","opt_notes":["那么，我马上开始做。(逻辑不符：事情已经做完)","总算赶上了，太好了。(得体回应：回应对方的感谢和道歉，表示事情圆满完成)","没能帮上忙，对不起。(逻辑不符：事实是帮上了忙)"]},{"num":8,"q":"鈴木先生、ゴミの減量化について、ご意見をお聞かせ願えますか。","opts":["では、ご意見をお聞きいたします。","お願いしてみてはどうでしょうか。","それでは、私の考えを。"],"ans":3,"analysis":"（考点：敬语应用/请求与许可） 铃木老师，关于垃圾减量化的问题，能请教一下您的意见吗?(ご意見をお聞かせ願えますか是请求对方发表意见的尊敬语)","opt_notes":["那么，我来听取您的意见。(角色混淆：这是请求方说的话)","拜托他试试怎么样?(答非所问)","那么，我就说说我的想法。(得体回应：作为被请求方，接受请求并准备开始陈述)"]},{"num":9,"q":"ねえ、新人の山本君ってビジネスマナーを知らないにもほどがあると思わない?","opts":["君がほめるなんて珍しいね。","彼なりに頑張ってるようだけどね。","しっかり教育してるだけあるね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：强烈批评） 喂，你不觉得新人山本，也太不懂商务礼仪了吗?(~にもほどがある是“太.......也要有个度”的句型，表达强烈的批评和不满)","opt_notes":["你能夸他真是难得啊。(逻辑不符：问句是强烈批评)","他好像也在按他自己的方式努力呢。(得体回应：~ようだけどね提出一个温和的不同观点，是自然的对话模式)","真不愧是好好教育过的。(逻辑不符：与问句的批评意图相反)"]},{"num":10,"q":"実用化の目処が立ったんです。","opts":["すごいね。もう実用化されたんだ。","気を落とすことないよ。","努力が実ってよかったね。"],"ans":3,"analysis":"（考点：惯用语/意图推断：报告进展） 前辈，我长年研究的课题，终于要进入实际应用阶段了。(目処が立つ是“有眉目, 有希望”的惯用语)","opt_notes":["好厉害，已经实际应用了啊。(逻辑不符：目処が立った只是“有眉目”，还未完成)","别灰心。(逻辑不符：这是好消息)","努力终于结果了，太好了。(得体回应：努力が実ってよかったね对对方的成果表示祝贺)"]},{"num":11,"q":"新商品のプレゼン、新人の佐藤君に任せたんだけど、荷が重いかな。","opts":["かえってチャンスってとらえてるみたいよ。","荷物を運ぶなら、私も手伝うわよ。","断られたんだ。仕方ないね。"],"ans":1,"analysis":"（考点：惯用语/意图推断：担忧/陷阱：原词复现） 新产品的发表，我交给了新人佐藤，对他来说是不是担子太重了?(荷が重い是“责任重大, 难以胜任”的惯用语)","opt_notes":["他好像反而把这当成一个机会呢。(得体回应：かえって〜とらえてるみたい是在对方提出担忧时，提供一个预想之外的、积极的视角)","如果是搬行李的话，我也来帮忙哦。(陷阱：将荷字面理解为“行李”)","被他拒绝了啊, 没办法。(逻辑不符：对方已经接受了任务)"]},{"num":12,"q":"部長、さしでがましいようですが、この不況の中、あえて新しい设备にお金をかけるというのは。","opts":["そっか。君も賛成してくれるのか。","どうして反対するのか聞かせてくれる。","やりたいっていうなら止めはしないけど。"],"ans":2,"analysis":"（考点：语法句型/意图推断：提出异议） 部长，恕我冒昧，但在如今不景气的情况下，硬要在新设备上投资，这......(さしでがましいようですが是提出异议前的铺垫，~というのは省略句尾，委婉地表达反对意见)","opt_notes":["哦是吗，你也赞成啊。(逻辑不符：对方在反对)","能告诉我你为什么反对吗?(得体回应：作为上级，询问下属提出反对意见的理由)","如果你想做的话我不会阻止。(逻辑不符：这是在许可，但对方在反对)"]},{"num":13,"q":"今朝の电车、もう込んでるなんてもんじゃなくて、参ったよ。","opts":["へえ、朝からすいてるなんて珍しいわね。","朝からそれだと、どっと疲れが出そうね。","毎日今朝みたいだったら、楽なのにね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：强烈抱怨） 今天早上的电车，根本不是一个“挤”字能形容的，真是受不了。(~なんてもんじゃない是“岂止是....根本不是...的程度”的强烈否定句型)","opt_notes":["诶，大早上就空荡荡的, 真稀奇。(逻辑不符：与込んでる的意思相反)","是啊，一大早就那样，感觉人都要累垮了。(得体回应：对对方的抱怨表示理解和共鸣)","要是每天早上都那样就轻松了。(逻辑不符：与参ったよ的抱怨语气相反)"]},{"num":14,"q":"新入生の加藤君って、なんでもずけずけ言うけど、愛嬌があって憎めないね。","opts":["なんとも、得な性格だよね。","そりゃ、加藤君は人を憎んだりしないだろう。","どうして、そんなにひどいこと言うの。"],"ans":1,"analysis":"（考点：惯用语/意图推断：评价） 新生加藤啊，虽然说话很直，但很讨喜，让人讨厌不起来。(ずけずけ言う是“直言不讳”，憎めない是“(虽有缺点但)让人讨厌不起来”) 2015年7月的14道完整题目已为您高精度全量提取完毕。 请您在下方回复“继续”，我将为您无缝开启【2015年12月】完整真题的全量精准文字化提取！","opt_notes":["真是种占便宜的性格啊。(得体回应：得な性格是对憎めない这种特质的精准评价)","那当然了，加藤是不会讨厌别人的吧。(逻辑不符：憎めない的主语是加藤，但动作的发出者是说话人)","你为什么要说那么过分的话?(逻辑不符：问句整体是正面评价)"]}]},{"label":"2015年12月","questions":[{"num":1,"q":"中山さん、明日の試合、出るからには絶対勝ってよ。","opts":["出るに決まってるでしょ。","応援してるから頑張ってね。","そんなにプレッシャーかけないでよ。"],"ans":3,"analysis":"（考点：语法句型/意图推断：激励） 中山，明天的比赛，既然要上场就一定要赢哦！ (~からには表示“既然...就一定...”，是带有激励和施压语气的表达)","opt_notes":["那是肯定要出场的吧。（答非所问）","我会为你加油的，努力啊。（角色混淆：这是拉拉队说的话，不是参赛者中山的回应）","别给我这么大压力啊。（得体回应：用半开玩笑的语气缓和对方施加的巨大期望）"]},{"num":2,"q":"あっ、雪だ。これはこの後、お花見どころじゃないね。","opts":["雪の中の花見も風情があって、いいと思うけど。","雪の日はここで花見しちゃいけないんだね。","雪なのに、花見するつていうの。"],"ans":1,"analysis":"（考点：语法句型/意图推断） 啊，下雪了。这下可不是赏樱的时候了。 (~どころじゃない表示“根本不是做某事的时候/场合”)","opt_notes":["不过我觉得雪中赏樱也别有风情，挺好的。（得体回应：针对同伴的消极看法，提出一个不同视角的积极建议）","下雪天不能在这里赏樱啊。（逻辑不符：表达非场所规则禁止，而是客观条件不合适）","下雪了还要去赏樱吗？（逻辑不符：对方明明已经说“不是赏樱的时候”了）"]},{"num":3,"q":"部長、こちら、あさっての会議の資料です。事前にご覧いただければと存じます。","opts":["いいえ、まだ読んでいないんだ。","会議までに見ておきたいの。","ああ、目を通しておくよ。"],"ans":3,"analysis":"（考点：敬语应用/请求与许可） 部长，这是后天会议的资料，想请您事先过目一下。 (ご覧いただければと存じます是希望上级过目的极度礼貌表达)","opt_notes":["不，我还没读。（答非所问：这是下属刚呈递上来的文件）","我想在会议前看一下。（角色混淆：这是请求方才说的话）","啊，我会看一下的。（得体回应：目を通しておくよ是上级接受下级请求时的标准职场批复语）"]},{"num":4,"q":"森さん、森さんが調べてくれなきゃ、トラブルの原因分からずじまいだったよ。","opts":["分かりました、すぐに調べてみます。","いいえ、そんな、わかってよかったです。","すみません、わからずじまいで。"],"ans":2,"analysis":"（考点：语法句型/意图推断：感谢） 森，要不是你帮忙调查，纠纷的原因就一直搞不清了。 (~解てくれなきゃ、〜ずじまいだった是表达感谢的虚拟语气句型，意为“多亏了你……否则就终究没能……”）","opt_notes":["明白了，我马上去调查。（时态不符：事情已经圆满结束）","哪里哪里，能弄清楚就好。（得体回应：面对同僚的诚挚感谢，表现出谦虚和欣慰）","对不起，最后还是没搞清楚。（逻辑不符：与纠纷原因已经查明的事实完全相反）"]},{"num":5,"q":"ほら、そこのラーメン屋、すごい行列。並ぶ人の気が知れないよね。","opts":["ちょっと、今から並ぶ気?","いくら人気があっても、並んでまではね。","確かに、並んだ甲斐がありそうだよね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：负面评价） 你看，那家拉面店，排着好长的队。真搞不懂那些排队的人在想什么。 (気が知れない是“无法理解、觉得不可思议”的贬义嫌弃表达)","opt_notes":["等等，你现在要去排队吗？（逻辑不符：说话人正在极力吐槽排队行为）","是啊，再怎么人气旺，要排队我可不干。（得体回应：对同伴不愿排队的负面态度给予强烈的赞同共鸣）","确实，看来排队也值得啊。（逻辑不符：与原句“搞不懂排队者”的嫌弃语感正好相反）"]},{"num":6,"q":"企画書、ご持参いただき、ありがとうございます。採用の可否は折ってご連絡ということで。","opts":["よろしくご検討のほど、お願いします。","ここでお待ちしたほうがよろしいですか。","では、こちらからご連絡するようにします。"],"ans":1,"analysis":"（考点：敬语应用/商务惯用语） 企划书已收到，非常感谢。关于是否采用，我们会稍后（改日）联系您。 (折って在此是商务口语中“稍后、改天、后续”的意思)","opt_notes":["那么，拜托您仔细审议了。（得体回应：作为提交资料的乙方，礼貌地请对方后续多多关照审阅）","我在这里等比较好吗？（缺乏常识：对方明确说了是“改日联系”，不能在现场赖着不走）","那么，我会主动联系您的。（逻辑不符：对方说了是由他们主动发起后续通知）"]},{"num":7,"q":"今朝の器械の不具合については、解決したし、主任に報告するまでもないか。","opts":["一応、伝えといたほうが。","じゃあ、すぐに主任に連絡します。","もう報告済みなんですね。"],"ans":1,"analysis":"（考点：语法句型/意图推断：征求意见） 今天早上机器的故障已经解决了，就没必要报告给主任了吧？ (~までもないか是“不需要……了吧”的自言自语式纠结询问)","opt_notes":["我觉得还是一応（姑且、保险起见）说一声比较好。（得体回应：给出谨慎的修正建议，职场凡事留痕，即便解决了也应知会一声）","那我马上去联系主任。（逻辑不符：对方倾向于“不汇报”，不能盲目越俎代庖去执行汇报）","已经报告过了啊。（逻辑不符：对方正在因“要不要报告”而举棋不定）"]},{"num":8,"q":"あれっ、なんだ。駅前のカレー屋、今日やってるじゃない。","opts":["ええ、やってると思ったのに。","君が思ってた通りだね。","休みだと思ってたの。"],"ans":3,"analysis":"（考点：意图推断：表达意外发现） 咦，怎么回事。站前的咖喱店，今天开着门嘛。 (~じゃない句尾升调，带有浓烈的“出乎意料、惊奇发现”的色彩)","opt_notes":["是啊，我还以为开着门呢。（逻辑自相矛盾：既然早就以为开着门，听到此话就不该感到意外）","和你想的一样呢。（逻辑不符：原句流露出的情绪恰恰是“和预料的不一样”）","你之前还以为它今天休息啊。（得体回应：准确指明了对方之所以发出惊叹，是因为原先抱有休息的误判）"]},{"num":9,"q":"客樣、こちらの電球はあいにく在庫切らしておりまして。","opts":["じゃあ、在庫のもので結構です。","ああ、こちらでは、扱っていないんですね。","あのう、次に入ってくるのはいつ頃ですか。"],"ans":3,"analysis":"（考点：意图推断：处理缺货状况） 客人，这款灯泡不巧正好没货了。 (在庫切らしておりまして是店员非常标准的缺货致歉用语)","opt_notes":["那就要有库存的那个吧。（逻辑硬伤：店员刚说了“没库存了”）","啊，就是说这里不卖这款是吧。（理解错误：在庫切れ是卖光了在等补货，不是不经营此产品）","那个，下次大概什么时候到货？（得体回应：作为意向购买的顾客，自然顺畅地询问下一次的补货周期）"]},{"num":10,"q":"先輩が仕事紹介してくれたんだけど、海外勤務の可能性もなくはないみたいで、どうしよう。","opts":["海外行くの、いやってこと?","海外勤務がないから、いいんじゃない。","そんなに海外で働きたいの。"],"ans":1,"analysis":"（考点：语法句型/意图推断：探明顾虑） 前辈介绍了个工作，好像也不是没有去海外工作的可能性，怎么办啊。 (なくはない双重否定表弱肯定，后接どうしよう凸显了说话人的犹豫不决与内心抗拒)","opt_notes":["也就是说，你其实不想去国外发展对吧？（得体回应：精准戳中了对方纠结和抗拒的核心原因）","因为没有海外工作，所以不是挺好吗。（逻辑硬伤：对方明明说了有外派可能性）","你就那么想去海外工作啊？（逻辑相反：对方要是极度渴望外派，就不会发出“怎么办”的愁闷感慨）"]},{"num":11,"q":"営業部の吉田さん、今日もまた遅刻したんだって。部長が怒るのも無理もないよね。","opts":["ああ、それで怒らなかったのか。","堂々としてて、さすがだよね。","最近続いてるようだし、仕方ないよね。"],"ans":3,"analysis":"（考点：惯用语/意图推断：看法呼应） 营业部的吉田，今天又迟到了。也难怪部长会生气啊。 (無理もない指事出有因、完全可以理解)","opt_notes":["啊，所以他才没生气啊。（逻辑相反：部长显然大发雷霆了）","沉着冷静，真不愧是他。（答非所问：跑题到赞扬当事人气场上去了）","听说最近老是这样，这也怪不得别人。（得体回应：用仕方ないよね补充阐明其频繁迟到的恶劣表现，完全赞同部长的怒火）"]},{"num":12,"q":"週末、旅行に行ったんですけど、旅先で、さんざんな目に遭いましたよ。","opts":["そんなにいろいろいいことあったんですか。","たとえば、どんな人に会ったんですか。","何か、困ったことでもあったんですか。"],"ans":3,"analysis":"（考点：惯用语/意图推断：宽慰探询） 周末去旅行了，结果在当地倒了大霉。 (さんざんな目に遭う是“吃尽苦头、极其倒霉”的常用贬义惯用语)","opt_notes":["遇到了那么多好事啊？（逻辑相反：彻底听反了褒贬色彩）","比如，你遇到什么样的人了？（听力核心陷阱：把表示遭遇的目に遭う中的目，误听成了物理上与人的“见面会面”）","发生什么让你头疼的麻烦事了吗？（得体回应：对同伴遭遇的不幸表示关切，并温和地询问具体细节）"]},{"num":13,"q":"あのう、先日の契約書の件、深くお詫び申し上げます。","opts":["どうぞ、お気になさらずに。","遠慮なくおしゃってください。","こちらこそ、大変嬉しく思います。"],"ans":1,"analysis":"（考点：敬语应用/商务道歉接纳） 那个，关于前几天的合同，我深表歉意。 (深くお詫び申し上げます是非常郑重的商务致歉)","opt_notes":["请千万不要放在心上。（得体回应：采用大度的姿态，原谅对方的过失，是商业交往中标准的安抚用语）","请不要客气，有话直说。（逻辑不符：对方在纯粹道歉，并没有要求或求助动作）","我也感到特别高兴。（严重缺乏常识：面对他人的郑重道歉，绝不能表达欢欣雀跃）"]},{"num":14,"q":"この企画案、立ててみたけど、果たして部長が首を縦に振るかどうか。","opts":["どっちにしても、不採用になったんだ。","見せてみなきゃ始まらないよ。","部長が承認してくれてこれでいけるね。"],"ans":2,"analysis":"（考点：惯用语/意图推断：结果悬而未决） 企划案是做出来了，但部长到底会不会点头同意呢。 (首を縦に振る是“赞同、批准”的惯用语，结合果たして〜かどうか凸显了对未来的强烈担忧) 2015年12月的 14 道超高精度全量题目已全部为您彻底还原完毕。 请您在下方回复“继续”，我将为您立刻无缝开启下一批次【2016年7月】真题的全量原汁原味重现！","opt_notes":["反正不管怎么说，最终都没被采用。（时态逻辑漏洞：结果还没出来，不能提前断言失败）","不管怎样，总得先拿去给他看看再说啊。（得体回应：劝慰同僚抛开无谓的焦虑，先去执行第一步，符合职场干劲）","部长已经批准了，这下稳了。（逻辑漏洞：对方正在发愁“不知会不会批准”，不可能此时已经拿到批复）"]}]},{"label":"2016年7月","questions":[{"num":1,"q":"鈴木君、このケーキ食べてみて、これ、砂糖を一切使わずに作ったんだよ。","opts":["たくさん入れたんだ。甘すぎない?","へえ?砂糖とほかになに入れたの?","えっ?まったく入ってないの?"],"ans":3,"analysis":"（考点：语法句型） 铃木, 尝尝这个蛋糕, 这个做的时候一点糖都没用。(~を一切使わずに是“完全不使用...”的意思)","opt_notes":["放了很多啊, 不会太甜吗? (逻辑不符：与一切使わず的意思完全相反)","哦? 除了糖还放了什么? (逻辑不符：前提是没放糖)","诶? 真的一点都没放? (得体回应：对一切使わず这一出乎意料的事实表示惊讶和确认)"]},{"num":2,"q":"加藤さん、この前、加藤さんが考えてくれたポスターのデザイン、もう少し何とかならないかな。","opts":["どのあたりが気になりますか?","じゃあ、少し多めに印刷しておきます。","気にいていただけて、よかったです。"],"ans":1,"analysis":"（考点：意图推断：请求修改） 加藤, 之前你构思的海报设计, 能不能再想想办法改进一下? (もう少し何とかならないかな是委婉地要求对方修改或改善的客气说法)","opt_notes":["您对哪个部分比较在意呢? (得体回应：作为被要求修改的一方, 主动询问具体的修改意见与修正方向)","那我稍微多印一些。 (答非所问：话题是“设计修改”, 不是“印刷数量”)","您能中意, 真是太好了。 (逻辑不符：对方在要求修改, 显然觉得并不理想)"]},{"num":3,"q":"本田さん、サークルの来年度の部長、本田さんに引き受けてもらえたらって思うんだけど。","opts":["あっ、私でよければ、是非やらせてください。","一度やってみたかったんですが、仕方ないです。","私のかわりにやってくださるんですか。"],"ans":1,"analysis":"（考点：请求与许可/授受关系） 本田, 关于社团下一年度的部长, 我想如果能请你来担任的话... (~に引き受けてもらえたらって思うんだけど是委婉地请求对方接受某项职务)","opt_notes":["啊, 如果我可以的话, 请务必让我来做。 (得体回应：私でよければ是欣然接受他人请求时的经典谦虚说法)","我也想做一次来着, 但没办法了。 (逻辑不符：对方正是来邀请你做的)","您要代替我做吗? (逻辑不符：对方在请求自己做, 角色反了)"]},{"num":4,"q":"お客様、こちら、従業員専用のエレベーターで、ご利用はご遠慮いただいております。","opts":["どうぞ、遠慮なさらずお使いください。","ではお言葉に甘えて。","気がつかなかったものですから、すみません。"],"ans":3,"analysis":"（考点：敬语应用/意图推断：提醒禁止） 客人, 这里是员工专用电梯, 请您不要使用。 (ご利用はご遠慮いただいております是“请勿使用”的礼貌商业禁止用语)","opt_notes":["请别客气, 随便用。 (角色混淆：这是允许使用的人说的话, 角色反了)","那我就不客气了。 (逻辑不符：对方在禁止, 无法接受提议)","我没注意到, 对不起。 (得体回应：気がつかなかったものですから解释由于疏忽导致违规的原因并诚恳道歉)"]},{"num":5,"q":"今回の山下監督の新しい映画、なんだかぱっとしなかったよ。","opts":["じゃ、見るのをやめとこうかな。","うん、評判がいいわけだ。","えっ?映画公開されなかったの?"],"ans":1,"analysis":"（考点：惯用语/意图推断：负面评价） 这次山下导演的新电影, 感觉不怎么样啊。 (ぱっとしない是“不起眼、不精彩、不怎么样”的惯用语)","opt_notes":["那我还是不看了吧。 (得体回应：根据同伴的负面反馈避雷，做出合理的个人决定)","嗯, 难怪评价那么好。 (逻辑不符：与ぱっとしない的负面评价完全相反)","诶? 电影没上映吗? (答非所问：对方已经说了看过了电影)"]},{"num":6,"q":"今日のイベント、来場者数が心配されたけど、前回を上回って、何よりだったね。","opts":["あれだけ集まってもまだ足りませんか?","思ってた以上に好評で、ほっとしました。","確かに、もう少しきてほしかったですね。"],"ans":2,"analysis":"（考点：意图推断：正面评价） 今天的活动, 虽然之前担心到场人数, 但结果超过了上次, 比什么都好啊。 (何よりだったね表示对好的结果感到非常欣慰和满意)","opt_notes":["聚集了那么多人还不够吗? (逻辑不符：说话人对结果已经很满意，此回复带有无端的对抗性)","比预想的更受好评, 放心了。 (得体回应：用ほっとしました附和对方的满意和舒心之情)","确实, 真希望再多来一些人啊。 (逻辑不符：说话人对已经“超过去次”的结果十分满意，不应继续抱怨)"]},{"num":7,"q":"最近、先輩とどうもぎくしゃくしてて..","opts":["先輩、体調を崩してたんだ。","やっと仲直りできたんだね。","なんか思い当たることないの?"],"ans":3,"analysis":"（考点：拟声拟态词/意图推断：倾听烦恼） 最近, 和前辈的关系总觉得有点僵。 (ぎくしゃくしてて是形容人际关系不和睦、生硬、产生隔阂的状态)","opt_notes":["先辈身体不舒服啊。 (逻辑不符：ぎくしゃく指关系，而非身体健康状况)","你们总算和好了啊。 (逻辑不符：与目前正在处于“关系僵硬”的现状完全相反)","你没想起什么原因吗? (得体回应：なんか思い当たることないの询问导致关系变僵的具体诱因)"]},{"num":8,"q":"小川さん、今回の取引先との交渉、小川さん一人で進めたいってことだけど、僕はどうかと思うよ。","opts":["あのう、一人でやるべきだとお考えですか?","はい、では早速話しをすすめることにします。","やはり私一人じゃ無理でしょうか。"],"ans":3,"analysis":"（考点：意图推断：提出异议） 小川, 这次和客户的谈判, 虽然你说想一个人进行, 但我对此有不同看法。 (僕はどうかと思うよ是委婉地表达反对或怀疑)","opt_notes":["那个, 您是认为我应该一个人做吗? (逻辑不符：听反了对方“どうかと思う（反对）”的意思)","好的, 那我马上开始谈。 (逻辑不符：完全无视了对方的反对和异议)","果然我一个人还是不行吗? (得体回应：准确理解了对方对自己独自谈判的担忧，并进行顺从确认)"]},{"num":9,"q":"営業部の吉田さん、今日もまた遅刻したんだって。部長が怒るのもわからなくもないなあ。","opts":["ああ、それで怒らなかったのか。","最近続いてるようだし、無理もないよね。","なんで部長の気持ちわかんないの?"],"ans":2,"analysis":"（考点：语法句型/意图推断：寻求共鸣） 营业部的吉田, 今天又迟到了。也难怪部长会生气啊。 (~のもわからなくもない是双重否定，表示“非常理解、理所当然”)","opt_notes":["啊, 所以他才没生气啊。 (逻辑不符：将双重否定误解为了完全否定部长生气)","最近老是这样, 也是难怪（理所当然）了。 (得体回应：無理もないよね完美附和了对方“理解部长生气”的看法)","为什么不理解部长的心情呢? (答非所问：说话人明明说了自己可以理解)"]},{"num":10,"q":"昨日誘ってくれた週末のバーベキュー、行きたいのはやまやまなんだけど。","opts":["もちろんきてもらって、かまわないよ。","えっ?何か予定でもあるの?","たまに外で食べるのもいいね。"],"ans":2,"analysis":"（考点：语法句型/意图推断：委婉拒绝） 昨天邀请你参加的周末 前回のも一緒に出すんですね。","あの、前例はないんでしょうか。","はい、前のを参考にします。"],"ans":3,"analysis":"（考点：语法句型/意图推断：职场指示） 第一大楼的工程报价单，你做一下，要参考之前的案例。（~を踏まえて表示“基于……、根据……”）","opt_notes":["啊，是说把上次的也一起交上去是吧。（理解错误：踏まえて是“参考经验”，不是“一起打包提交”）","那个，没有先例吗？（逻辑不符：上司指示里已经明确让你去参考现有的前例了）","好的，我会参考之前的来做。（得体回应：准确理解并顺从接受了上司的指示）"]},{"num":5,"q":"リーさん、リーさんのレポート、結論のとこ、もっとすっきりできないものかな？","opts":["これじゃ、すっきりしすぎなんですね。","あのう、できそうにないでしょうか。","もう一度見直して、修正します。"],"ans":3,"analysis":"（考点：语法句型/意图推断：请求修改） 小李，你的报告，结论部分能不能再写得简洁明了一些？ （~できないものかな是〜できませんか的更委婉、更隐晦的职场修正请求）","opt_notes":["这样是太简洁了是吧。（逻辑不符：上司的意思是“目前太累赘，不够简洁”）","那个，恐怕做不到吧？（逻辑不符：语调带有推卸和消极对抗感，非得体回答）","我会再检查一遍并进行修改。（得体回应：积极接受修改意见并给出明确的工作承诺）"]},{"num":6,"q":"新人の伊藤君が、クレーム処理一人でやったって、頼もしいね。","opts":["本人によく注意しておきます。","新人といってもしっかりしてますよ。","经验が足りないので、仕方ありませんよね。"],"ans":2,"analysis":"（考点：意图推断：正面评价） 新人伊藤一个人处理了客诉，真了不起（靠得住）啊。（頼もしい是对后辈可靠、有前途、能独当一面的正面赞赏）","opt_notes":["我会好好提醒（警告）他本人的。（逻辑不符：对方在极力夸奖，不需要去批评）","是啊，虽说是新人，但做事非常沉稳（靠谱）呢。（得体回应：完全附和同僚对后辈的正面赞美）","因为经验不足，所以也没办法。（逻辑不符：与赞许伊藤独立搞定客诉的事实完全相反）"]},{"num":7,"q":"この間、初めてサーフィンやったんだけど、もうやるもんかって思ったよ。","opts":["そんなに楽しかったの？","一回で懲りちゃった？","じゃ、またやるつもり？"],"ans":2,"analysis":"（考点：语法句型/意图推断：极差好评） 前阵子第一次玩了冲浪，我心里想以后打死也不玩了。（~ものか/~もんか表达极其强烈的否定意志，意为“绝对不、才不”）","opt_notes":["有那么开心啊？（逻辑不符：与强烈的抗拒、厌恶意志完全相反）","玩了一次就彻底受够了（吃足苦头）吗？（得体回应：惩りる指吸取教训、吃够苦头再也不想试了，精准戳中了说话人的悲催心境）","那就是说还打算再玩咯？（逻辑不符：完全听反了否定意志）"]},{"num":8,"q":"ねえ、さっき会議で僕が言ったこと、気に障ったんじゃない？","opts":["えっ、別にそんなことないよ。","えっ、うそだったの？そんなあ。","えっ、よく聞こえてたけど。"],"ans":1,"analysis":"（考点：惯用语/意图推断：确认消除顾虑） 喂，刚才在会上我说的话，是不是得罪（冒犯）你了？ （気に障る是“冒犯、得罪、触怒、让人生气”的常用高频惯用语）","opt_notes":["诶，完全没有那回事哦。（得体回应：用果断松弛的语气全盘否定，迅速消除同僚不必要的社交顾虑）","诶？那是骗人的吗？怎么这样啊。（答非所问：完全偏离逻辑）","诶？我听得很清楚啊。（答非所问陷阱：误把涉及情绪冒犯的気に障る，当成了物理听觉上的妨碍）"]},{"num":9,"q":"武田くん、頼んだ書類の整理、そっちのけで何やってるの？","opts":["もう整理、やる必要ないんですか。","あっ、すみません。すぐやります。","えっ、そっちでやるんでしたっけ？"],"ans":2,"analysis":"（考点：惯用语/意图推断：接受批评） 武田，让你整理的文件被你扔在一边不管，你到底在干嘛呢？ （そっちのけで是“把本职/重要的事情抛诸脑后、弃置不顾”的批评指责语）","opt_notes":["已经不需要再整理了吗？（逻辑不符：属于顶撞或无理取闹）","啊，对不起。我立刻就做。（得体回应：面对明显的玩忽职守指责，立刻真诚道歉并执行补救）","诶？那件事不是你那边负责做吗？（极度恶劣：属于当场甩锅、推卸责任的典型负面沟通
